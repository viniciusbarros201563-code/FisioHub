        // --- BIBLIOTECA DE EXERCÍCIOS PADRÃO (ESTÁTICA) ---
        const EXERCISES_LIBRARY = [

            { id: "ex-3", name: "Alongamento Global de Cadeia Posterior (Pilates)", cat: "Alongamentos", desc: "Sentado, pernas esticadas, tenta alcançar os pés mantendo o alinhamento da coluna.", sets: "3", reps: "30 segundos" },
            { id: "ex-4", name: "Ativação do Manguito Rotador com Elástico", cat: "Fortalecimento", desc: "Rotação externa ativa do ombro com resistência leve de banda elástica.", sets: "3", reps: "15 repetições" }
        ];

        // --- FUNÇÃO AUXILIAR: CALCULAR IDADE ---
        function calculateAge(birthDateString) {
            if (!birthDateString) return "";
            const today = new Date();
            const birthDate = new Date(birthDateString);
            let age = today.getFullYear() - birthDate.getFullYear();
            const m = today.getMonth() - birthDate.getMonth();
            if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) {
                age--;
            }
            return age >= 0 ? age : 0;
        }

        // --- FUNÇÃO AUXILIAR: CALCULAR E CLASSIFICAR IMC ---
        function calculateIMC(weight, height) {
            const w = parseFloat(weight);
            const h = parseFloat(height);
            if (!w || !h || h <= 0) return { imc: 0, classif: "Aguardando dados..." };
            
            const imcVal = w / (h * h);
            const imcStr = imcVal.toFixed(1);
            
            let classif = "";
            if (imcVal < 18.5) classif = "Abaixo do peso";
            else if (imcVal < 25) classif = "Peso saudável";
            else if (imcVal < 30) classif = "Sobrepeso";
            else classif = "Obesidade";
            
            return { imc: imcStr, classif };
        }

        // --- FUNÇÃO AUXILIAR: MÁSCARA CPF ---
        function formatCPF(val) {
            if (!val) return "";
            const clean = val.replace(/\D/g, "");
            return clean
                .replace(/(\d{3})(\d)/, "$1.$2")
                .replace(/(\d{3})(\d)/, "$1.$2")
                .replace(/(\d{3})(\d{1,2})$/, "$1-$2")
                .substring(0, 14);
        }

        // --- FUNÇÃO AUXILIAR: ESTRUTURA DE FICHA COMPLETA ZERADA ---
        function getEmptyWizardForm() {
            return {
                name: "", birthDate: "", age: "", gender: "M", cpf: "", rg: "", phone: "", email: "", address: "",
                maritalStatus: "Solteiro", occupation: "", insurance: "Particular", insuranceCard: "",
                weight: "", height: "", imc: 0, emergencyContact: "", emergencyPhone: "",
                emergencyRelation: "", clinicalDiagnosis: "", queixaPrincipal: "", hda: "",
                comorbidades: { has: false, dm: false, cardio: false, implantes: "", medicamentos: "" },
                habitos: { atividade: "Sedentário", tabagismo: "Não", sono: "Boa", agua: "1L a 2L", ergonomics: "" },
                dor: { intensidade: 5, piorRecente: 5, frequencia: "Intermitente", periodo: "Manhã", localizacao: "", mapaZonas: [] },
                scales: { berg: 56, barthel: 100 },
                ashworthEvaluated: [
                    { id: "ash-1", musculo: "Flexores do Cotovelo", grau: "Grau 0 - Sem aumento de tônus" }
                ],
                sinaisVitais: { pa: "", fc: "", spo2: "" },
                exameFisico: { inspecao: "", palpacao: "", sensibilidade: "", testes: "" },
                segmentosEvaluated: [
                    { id: "seg-1", nome: "Coluna Lombar", adm: "Normal", forca: "Grau 5 - Força Normal", anotacao: "" }
                ],
                diagnosticoCinesio: "", objetivos: "", conduta: "", frequencia: "2x por semana", reavaliacaoSessoes: 10
            };
        }

        function FisioHubApp() {
            // --- ESTADOS DO BANCO DE DADOS LOCAL (LocalStorage) ---
            const [accounts, setAccounts] = useState(() => {
                const saved = localStorage.getItem("fisiohub_accounts");
                return saved ? JSON.parse(saved) : [];
            });

            const [patients, setPatients] = useState(() => {
                const saved = localStorage.getItem("fisiohub_patients");
                return saved ? JSON.parse(saved) : [];
            });

            const [appointments, setAppointments] = useState(() => {
                const saved = localStorage.getItem("fisiohub_appointments");
                return saved ? JSON.parse(saved) : [];
            });

            const [financials, setFinancials] = useState(() => {
                const saved = localStorage.getItem("fisiohub_financials");
                return saved ? JSON.parse(saved) : [];
            });

            const [logs, setLogs] = useState(() => {
                const saved = localStorage.getItem("fisiohub_logs");
                return saved ? JSON.parse(saved) : [];
            });

            // --- ESTADOS DE SESSÃO E NAVEGAÇÃO ---
            const [activeAccount, setActiveAccount] = useState(() => {
                const saved = localStorage.getItem("fisiohub_active_account");
                return saved ? JSON.parse(saved) : null;
            });

            const [view, setView] = useState("login"); // login, dashboard, wizard, my-team, finances, audit-logs
            const [isRegistering, setIsRegistering] = useState(false);
            const [searchTerm, setSearchTerm] = useState("");
            
            // Controle de visualização de prontuário selecionado
            const [selectedPatientId, setSelectedPatientId] = useState(null);
            const [patientDetailTab, setPatientDetailTab] = useState("eval"); // eval, evolues, exercises

            // Formulários e Modais
            const [authForm, setAuthForm] = useState({ email: "", password: "", name: "", crefito: "", type: "fisioterapeuta" });
            const [wizardForm, setWizardForm] = useState(getEmptyWizardForm());
            const [wizardStep, setWizardStep] = useState(1);
            const [wizardType, setWizardType] = useState("private"); // private, clinic-complete, edit

            const [newEvolutionText, setNewEvolutionText] = useState("");
            const [newEvolutionPain, setNewEvolutionPain] = useState(5);
            
            // Cadastro de Profissionais Vinculados (apenas visível para Perfil Clínica)
            const [newPhysio, setNewPhysio] = useState({ name: "", crefito: "", email: "" });

            // Registro Financeiro Rápido
            const [newTransaction, setNewTransaction] = useState({ type: "receita", description: "", val: "", category: "Atendimento", method: "PIX" });

            // Agendamento Rápido de Recepção
            const [newAppoint, setNewAppoint] = useState({ patientName: "", patientPhone: "", date: "", time: "", physioId: "", type: "Avaliação" });

            // Alertas/Toasts Customizados
            const [toast, setToast] = useState(null);

            // Modais e Estados de Confirmação customizados (Deletar e Alertas)
            const [deleteTargetId, setDeleteTargetId] = useState(null);

            // Estados adicionais para agendamento acoplado à avaliação
            const [scheduleFirstSession, setScheduleFirstSession] = useState(false);
            const [scheduledDate, setScheduledDate] = useState("");
            const [scheduledTime, setScheduledTime] = useState("");
            const [agendaConflict, setAgendaConflict] = useState("");

            // --- SINCRONIZAÇÃO DE CONFLITOS DE AGENDA EM TEMPO REAL ---
            useEffect(() => {
                if (scheduleFirstSession && scheduledDate && scheduledTime) {
                    const conflict = appointments.find(app => app.date === scheduledDate && app.time === scheduledTime);
                    if (conflict) {
                        const otherPatient = patients.find(p => p.id === conflict.patientId);
                        setAgendaConflict(`⚠️ Conflito de Horário: Já existe um atendimento (${conflict.type}) marcado para ${otherPatient ? otherPatient.name : "outro paciente"} neste mesmo dia às ${scheduledTime}.`);
                    } else {
                        setAgendaConflict("");
                    }
                } else {
                    setAgendaConflict("");
                }
            }, [scheduleFirstSession, scheduledDate, scheduledTime, appointments, patients]);

            // --- SINCRONIZAÇÃO LOCAL STORAGE ---
            useEffect(() => { localStorage.setItem("fisiohub_accounts", JSON.stringify(accounts)); }, [accounts]);
            useEffect(() => { localStorage.setItem("fisiohub_patients", JSON.stringify(patients)); }, [patients]);
            useEffect(() => { localStorage.setItem("fisiohub_appointments", JSON.stringify(appointments)); }, [appointments]);
            useEffect(() => { localStorage.setItem("fisiohub_financials", JSON.stringify(financials)); }, [financials]);
            useEffect(() => { localStorage.setItem("fisiohub_logs", JSON.stringify(logs)); }, [logs]);
            useEffect(() => {
                if (activeAccount) {
                    localStorage.setItem("fisiohub_active_account", JSON.stringify(activeAccount));
                } else {
                    localStorage.removeItem("fisiohub_active_account");
                }
            }, [activeAccount]);

            // Forçar login view ao iniciar sem sessão
            useEffect(() => {
                if (!activeAccount) {
                    setView("login");
                } else if (view === "login") {
                    setView("dashboard");
                }
            }, [activeAccount]);

            // --- SISTEMA DE LOGS / AUDITORIA ---
            const logActivity = (desc) => {
                const newLog = {
                    id: "log-" + Date.now(),
                    date: new Date().toLocaleDateString("pt-BR") + " " + new Date().toLocaleTimeString("pt-BR"),
                    user: activeAccount ? activeAccount.name : "Sistema",
                    type: activeAccount ? activeAccount.type : "Geral",
                    description: desc
                };
                setLogs(prev => [newLog, ...prev]);
            };

            const triggerToast = (msg, status = "success") => {
                setToast({ msg, status });
                setTimeout(() => setToast(null), 3000);
            };

            // --- CONTROLES DE AUTENTICAÇÃO ---
            const handleAuthSubmit = (e) => {
                e.preventDefault();
                if (isRegistering) {
                    if (!authForm.email || !authForm.password || !authForm.name) {
                        triggerToast("Preencha todos os campos obrigatórios.", "error");
                        return;
                    }
                    if (accounts.some(acc => acc.email === authForm.email)) {
                        triggerToast("Este e-mail já está cadastrado.", "error");
                        return;
                    }
                    const newAcc = {
                        id: "acc-" + Date.now(),
                        ...authForm,
                        linkedPhysios: [] // para perfil clínica salvar a equipe
                    };
                    setAccounts(prev => [...prev, newAcc]);
                    setActiveAccount(newAcc);
                    triggerToast("Cadastro efetuado com sucesso!");
                    setIsRegistering(false);
                    setView("dashboard");
                } else {
                    const found = accounts.find(acc => acc.email === authForm.email && acc.password === authForm.password);
                    if (found) {
                        setActiveAccount(found);
                        triggerToast(`Bem-vindo, ${found.name}!`);
                        setView("dashboard");
                    } else {
                        triggerToast("E-mail ou senha incorretos.", "error");
                    }
                }
                setAuthForm({ email: "", password: "", name: "", crefito: "", type: "fisioterapeuta" });
            };

            // GERAÇÃO RÁPIDA DE CONTAS DE DEMONSTRAÇÃO (MVP ONBOARDING)
            const handleGenerateDemoAccount = (type) => {
                const demoEmail = type === "fisioterapeuta" ? "fisio.demo@fisiohub.com" : "clinica.demo@fisiohub.com";
                const existing = accounts.find(acc => acc.email === demoEmail);

                if (existing) {
                    setActiveAccount(existing);
                    triggerToast(`Acessando Conta de Demonstração!`);
                    setView("dashboard");
                    return;
                }

                const demoAcc = {
                    id: "acc-demo-" + Date.now(),
                    name: type === "fisioterapeuta" ? "Dr. Vinicius Barros" : "Clínica FisioVida Alagoas",
                    email: demoEmail,
                    password: "demo",
                    type: type,
                    crefito: type === "fisioterapeuta" ? "98754-F" : "",
                    linkedPhysios: type === "clinica" ? [
                        { id: "phy-1", name: "Dra. Mariana Silva", crefito: "12345-F", email: "mariana@fisiohub.com" },
                        { id: "phy-2", name: "Dr. Vinicius Barros", crefito: "98754-F", email: "vinicius@fisiohub.com" }
                    ] : []
                };

                setAccounts(prev => [...prev, demoAcc]);
                setActiveAccount(demoAcc);
                triggerToast(`Conta demonstrativa criada! Use a senha "demo" para acessos futuros.`);
                setView("dashboard");
            };

            const handleLogout = () => {
                logActivity("Efetuou logout do sistema");
                setActiveAccount(null);
                setSelectedPatientId(null);
                setView("login");
            };

            // --- SELETORES E FILTROS DE PERMISSÕES ---
            const visiblePatients = useMemo(() => {
                if (!activeAccount) return [];
                
                let list = patients;
                // Filtrar por Clínica ou Fisioterapeuta Autônomo
                if (activeAccount.type === "clinica") {
                    // Clínicas visualizam todos os pacientes cadastrados sob a sua clínica
                    list = patients.filter(p => p.createdBy === activeAccount.id);
                } else {
                    // Fisioterapeuta Autônomo visualiza:
                    // 1. Seus pacientes privados criados por ele
                    // 2. Pacientes de clínicas que foram encaminhados explicitamente para o seu CREFITO
                    list = patients.filter(p => p.createdBy === activeAccount.id || p.assignedCrefito === activeAccount.crefito);
                }

                // Filtrar busca
                if (searchTerm.trim()) {
                    const norm = searchTerm.toLowerCase();
                    list = list.filter(p => 
                        p.name.toLowerCase().includes(norm) || 
                        (p.cpf && p.cpf.replace(/\D/g, "").includes(norm.replace(/\D/g, "")))
                    );
                }
                return list;
            }, [patients, activeAccount, searchTerm]);

            const currentClinicPhysios = useMemo(() => {
                if (!activeAccount || activeAccount.type !== "clinica") return [];
                return activeAccount.linkedPhysios || [];
            }, [activeAccount]);

            const activePatient = useMemo(() => {
                return patients.find(p => p.id === selectedPatientId) || null;
            }, [patients, selectedPatientId]);

            // --- AÇÕES DO WIZARD DE AVALIAÇÃO ---
            const handleStartPrivateWizard = () => {
                setWizardForm(getEmptyWizardForm());
                setWizardType("private");
                setWizardStep(1);
                setView("wizard");
            };

            const handleStartClinicCompleteWizard = (patient) => {
                setWizardForm({
                    ...getEmptyWizardForm(),
                    ...patient,
                    id: patient.id // Mantém o ID original do pré-cadastro
                });
                setWizardType("clinic-complete");
                setWizardStep(1);
                setView("wizard");
            };

            const handleStartEditWizard = (patient) => {
                setWizardForm({
                    ...patient
                });
                setWizardType("edit");
                setWizardStep(1);
                setView("wizard");
            };

            const handleSaveWizard = (e) => {
                e.preventDefault();
                if (!wizardForm.name || !wizardForm.cpf) {
                    triggerToast("Nome e CPF são necessários para salvar.");
                    return;
                }

                const newPatientId = wizardForm.id || "pat-" + Date.now();

                // Trata o agendamento acoplado se estiver ativo
                if (scheduleFirstSession && scheduledDate && scheduledTime) {
                    const newAppoint = {
                        id: "app-" + Date.now(),
                        patientId: newPatientId,
                        date: scheduledDate,
                        time: scheduledTime,
                        status: "Agendado",
                        type: "Atendimento Inicial"
                    };
                    setAppointments(prev => [newAppoint, ...prev]);
                    logActivity(`Consulta automática agendada para: ${wizardForm.name} em ${scheduledDate} às ${scheduledTime}`);
                }

                if (wizardType === "private") {
                    const newPatient = {
                        ...wizardForm,
                        id: newPatientId,
                        date: new Date().toISOString().split('T')[0],
                        createdBy: activeAccount.id,
                        therapistName: activeAccount.name,
                        therapistCrefito: activeAccount.crefito || "N/A",
                        isPrivate: true,
                        isCompleted: true,
                        evolutions: []
                    };
                    setPatients(prev => [newPatient, ...prev]);
                    setSelectedPatientId(newPatient.id);
                    logActivity(`Nova ficha de avaliação privada criada para: ${newPatient.name}`);
                } else if (wizardType === "edit") {
                    setPatients(prev => prev.map(p => {
                        if (p.id === wizardForm.id) {
                            return {
                                ...wizardForm,
                                isCompleted: true
                            };
                        }
                        return p;
                    }));
                    setSelectedPatientId(wizardForm.id);
                    logActivity(`Ficha clínica alterada/atualizada para: ${wizardForm.name}`);
                } else {
                    // clinic-complete
                    setPatients(prev => prev.map(p => {
                        if (p.id === wizardForm.id) {
                            return {
                                ...wizardForm,
                                isCompleted: true,
                                therapistName: activeAccount.name,
                                therapistCrefito: activeAccount.crefito || "N/A",
                                date: new Date().toISOString().split('T')[0]
                            };
                        }
                        return p;
                    }));
                    setSelectedPatientId(wizardForm.id);
                    logActivity(`Avaliação clínica admissional concluída para o paciente: ${wizardForm.name}`);
                }

                triggerToast("Paciente avaliado e salvo com sucesso!");
                setView("dashboard");
                setWizardForm(getEmptyWizardForm());
                setScheduleFirstSession(false);
                setScheduledDate("");
                setScheduledTime("");
                setAgendaConflict("");
            };

            const handleAddEvolution = (e) => {
                e.preventDefault();
                if (!newEvolutionText.trim()) return;

                const newEvObj = {
                    id: "ev-" + Date.now(),
                    date: new Date().toLocaleDateString("pt-BR"),
                    pain: newEvolutionPain,
                    text: newEvolutionText,
                    therapist: activeAccount.name
                };

                setPatients(prev => prev.map(p => {
                    if (p.id === activePatient.id) {
                        return {
                            ...p,
                            evolutions: [newEvObj, ...(p.evolutions || [])]
                        };
                    }
                    return p;
                }));

                setNewEvolutionText("");
                setNewEvolutionPain(5);
                triggerToast("Evolução diária registrada!");
                logActivity(`Adicionou evolução clínica para o paciente: ${activePatient.name}`);
            };

            const handleDeletePatient = (patientId) => {
                setPatients(prev => prev.filter(p => p.id !== patientId));
                setAppointments(prev => prev.filter(app => app.patientId !== patientId));
                setSelectedPatientId(null);
                setDeleteTargetId(null);
                triggerToast("Ficha excluída de forma definitiva.");
                logActivity(`Excluiu definitivamente a ficha de prontuário: ${patientId}`);
            };

            // --- AÇÕES DO PAINEL DA CLÍNICA (RECEBIMENTO / PRE-CADASTRO) ---
            const handleClinicPreRegister = (e) => {
                e.preventDefault();
                if (!newAppoint.patientName || !newAppoint.physioId) {
                    triggerToast("Nome do paciente e fisioterapeuta são necessários.", "error");
                    return;
                }

                const matchedPhysio = activeAccount.linkedPhysios.find(p => p.crefito === newAppoint.physioId);

                const newPatient = {
                    id: "pat-pre-" + Date.now(),
                    name: newAppoint.patientName,
                    phone: newAppoint.patientPhone,
                    birthDate: newAppoint.dateOfBirth || "",
                    age: calculateAge(newAppoint.dateOfBirth),
                    cpf: newAppoint.patientCpf || "",
                    gender: "M",
                    address: "",
                    isCompleted: false, // precisa da avaliação técnica do fisio
                    createdBy: activeAccount.id, // criado por esta clínica
                    assignedCrefito: newAppoint.physioId, // encaminhado para este profissional
                    assignedPhysioName: matchedPhysio ? matchedPhysio.name : "N/D",
                    date: new Date().toISOString().split('T')[0],
                    evolutions: []
                };

                setPatients(prev => [newPatient, ...prev]);

                // Agenda o horário da consulta inicial
                if (newAppoint.date && newAppoint.time) {
                    const appObj = {
                        id: "app-" + Date.now(),
                        patientId: newPatient.id,
                        date: newAppoint.date,
                        time: newAppoint.time,
                        physioId: newAppoint.physioId,
                        physioName: matchedPhysio ? matchedPhysio.name : "N/D",
                        status: "Agendado",
                        type: newAppoint.type || "Avaliação"
                    };
                    setAppointments(prev => [appObj, ...prev]);
                }

                setNewAppoint({ patientName: "", patientPhone: "", date: "", time: "", physioId: "", type: "Avaliação" });
                triggerToast("Pré-cadastro e encaminhamento salvos com sucesso!");
                logActivity(`Pré-cadastrou e encaminhou o paciente: ${newPatient.name}`);
            };

            // --- GERENCIAMENTO DE EQUIPE (Aba clínica) ---
            const handleAddPhysio = (e) => {
                e.preventDefault();
                if (!newPhysio.name || !newPhysio.crefito) {
                    triggerToast("Preencha Nome e CREFITO.", "error");
                    return;
                }

                const updatedPhysios = [...(activeAccount.linkedPhysios || []), { ...newPhysio, id: "phy-" + Date.now() }];
                const updatedAcc = { ...activeAccount, linkedPhysios: updatedPhysios };
                
                // Atualizar nas duas listas de persistência
                setActiveAccount(updatedAcc);
                setAccounts(prev => prev.map(acc => acc.id === activeAccount.id ? updatedAcc : acc));
                
                setNewPhysio({ name: "", crefito: "", email: "" });
                triggerToast("Fisioterapeuta vinculado com sucesso!");
                logActivity(`Vinculou o fisioterapeuta à equipe: ${newPhysio.name}`);
            };

            const handleRemovePhysio = (crefito) => {
                const updatedPhysios = activeAccount.linkedPhysios.filter(p => p.crefito !== crefito);
                const updatedAcc = { ...activeAccount, linkedPhysios: updatedPhysios };

                setActiveAccount(updatedAcc);
                setAccounts(prev => prev.map(acc => acc.id === activeAccount.id ? updatedAcc : acc));
                triggerToast("Fisioterapeuta removido da equipe.");
                logActivity(`Removeu o fisioterapeuta CREFITO: ${crefito}`);
            };

            // --- SISTEMA FINANCEIRO ---
            const handleAddTransaction = (e) => {
                e.preventDefault();
                if (!newTransaction.val || !newTransaction.description) return;

                const trans = {
                    id: "tr-" + Date.now(),
                    ...newTransaction,
                    val: parseFloat(newTransaction.val),
                    date: new Date().toLocaleDateString("pt-BR"),
                    createdBy: activeAccount.id
                };

                setFinancials(prev => [trans, ...prev]);
                setNewTransaction({ type: "receita", description: "", val: "", category: "Atendimento", method: "PIX" });
                triggerToast("Movimentação registrada!");
                logActivity(`Registrou financeiro: ${newTransaction.description}`);
            };

            const financialStats = useMemo(() => {
                const clinicTrans = financials.filter(f => f.createdBy === activeAccount?.id);
                const receitas = clinicTrans.filter(f => f.type === "receita").reduce((acc, curr) => acc + curr.val, 0);
                const despesas = clinicTrans.filter(f => f.type === "despesa").reduce((acc, curr) => acc + curr.val, 0);
                return {
                    receitas,
                    despesas,
                    saldo: receitas - despesas
                };
            }, [financials, activeAccount]);

            return (
                <div className="min-h-screen flex flex-col bg-slate-50">
                    
                    {/* CUSTOM TOAST SYSTEM */}
                    {toast && (
                        <div className="fixed top-6 right-6 z-50 flex items-center gap-3 bg-slate-900 text-white py-3.5 px-5 rounded-2xl shadow-xl border-l-4 border-brand-500 animate-bounce no-print">
                            <span className="text-xs font-black tracking-wide uppercase">{toast.msg}</span>
                        </div>
                    )}

                    {/* CONFIRMATION EXCLUSION MODAL */}
                    {deleteTargetId && (
                        <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4 backdrop-blur-sm no-print">
                            <div className="bg-white rounded-3xl max-w-sm w-full p-6 text-center shadow-2xl animate-in zoom-in duration-200">
                                <div className="w-12 h-12 bg-red-50 text-red-600 rounded-full flex items-center justify-center mx-auto mb-4">
                                    <SVG.Trash />
                                </div>
                                <h3 className="text-base font-black text-slate-800 uppercase tracking-wider mb-2">Excluir Prontuário?</h3>
                                <p className="text-xs text-slate-500 mb-6">Esta operação é irreversível e excluirá todo o histórico de avaliações e evoluções do paciente.</p>
                                <div className="flex gap-3 justify-center">
                                    <button 
                                        onClick={() => handleDeletePatient(deleteTargetId)} 
                                        className="px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded-xl text-xs font-black uppercase transition-all"
                                    >
                                        Excluir
                                    </button>
                                    <button 
                                        onClick={() => setDeleteTargetId(null)} 
                                        className="px-4 py-2 hover:bg-slate-100 text-slate-500 rounded-xl text-xs font-bold transition-all"
                                    >
                                        Cancelar
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* HEADER NO-PRINT */}
                    {activeAccount && (
                        <header className="bg-gradient-to-r from-brand-700 to-brand-950 text-white shadow-md no-print">
                            <div className="max-w-7xl mx-auto px-4 py-4 sm:px-6 lg:px-8 flex flex-col md:flex-row justify-between items-center gap-4">
                                <div className="flex items-center gap-3">
                                    <div className="bg-teal-500/10 p-2 rounded-xl border border-teal-500/30">
                                        <SVG.Activity className="w-7 h-7 text-teal-300" />
                                    </div>
                                    <div>
                                        <h1 className="text-xl font-black uppercase tracking-tight flex items-center gap-1">
                                            Fisio<span className="text-teal-400">Hub</span>
                                            <span className="bg-brand-500 text-slate-900 text-[9px] font-black uppercase px-2 py-0.5 rounded-full tracking-widest">2.0</span>
                                        </h1>
                                        <p className="text-[10px] text-teal-100/70 uppercase font-bold tracking-widest">Gerenciamento Integrado de Consultórios</p>
                                    </div>
                                </div>

                                <div className="flex items-center gap-4">
                                    <div className="text-right text-xs">
                                        <p className="font-black text-teal-100 uppercase tracking-wider">{activeAccount.name}</p>
                                        <p className="text-[9px] text-teal-300 font-bold uppercase tracking-widest">
                                            {activeAccount.type === "clinica" ? "Clínica de Fisioterapia" : `Fisioterapeuta • CREFITO: ${activeAccount.crefito}`}
                                        </p>
                                    </div>
                                    <button 
                                        onClick={handleLogout} 
                                        className="p-2 bg-teal-950/40 border border-teal-500/20 hover:bg-teal-900/50 rounded-xl text-teal-300 transition-all"
                                        title="Log out"
                                    >
                                        <SVG.LogOut />
                                    </button>
                                </div>
                            </div>
                        </header>
                    )}

                    {/* SIDEBAR NAVIGATION NO-PRINT */}
                    {activeAccount && (
                        <nav className="bg-slate-900 text-white border-b border-slate-800 no-print">
                            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                                <div className="flex space-x-6 overflow-x-auto no-scrollbar py-1">
                                    <button 
                                        onClick={() => { setView("dashboard"); setSelectedPatientId(null); }}
                                        className={`py-3 px-1 font-black text-[10px] uppercase tracking-widest border-b-2 flex items-center gap-1.5 transition-all ${view === 'dashboard' ? 'border-brand-500 text-brand-400' : 'border-transparent text-slate-400 hover:text-white'}`}
                                    >
                                        <SVG.Clipboard className="w-4 h-4" /> Prontuários
                                    </button>
                                    
                                    {activeAccount.type === "clinica" && (
                                        <button 
                                            onClick={() => setView("my-team")}
                                            className={`py-3 px-1 font-black text-[10px] uppercase tracking-widest border-b-2 flex items-center gap-1.5 transition-all ${view === 'my-team' ? 'border-brand-500 text-brand-400' : 'border-transparent text-slate-400 hover:text-white'}`}
                                        >
                                            <SVG.Users className="w-4 h-4" /> Minha Equipe
                                        </button>
                                    )}

                                    <button 
                                        onClick={() => setView("finances")}
                                        className={`py-3 px-1 font-black text-[10px] uppercase tracking-widest border-b-2 flex items-center gap-1.5 transition-all ${view === 'finances' ? 'border-brand-500 text-brand-400' : 'border-transparent text-slate-400 hover:text-white'}`}
                                    >
                                        <SVG.Dollar className="w-4 h-4" /> Financeiro
                                    </button>

                                    <button 
                                        onClick={() => setView("audit-logs")}
                                        className={`py-3 px-1 font-black text-[10px] uppercase tracking-widest border-b-2 flex items-center gap-1.5 transition-all ${view === 'audit-logs' ? 'border-brand-500 text-brand-400' : 'border-transparent text-slate-400 hover:text-white'}`}
                                    >
                                        <SVG.Shield className="w-4 h-4" /> Auditoria (LGPD)
                                    </button>
                                </div>
                            </div>
                        </nav>
                    )}

                    {/* CONTENT AREA */}
                    <main className="flex-grow max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8">
                        
                        {/* --- VIEW 1: AUTHENTICATION / LOGIN --- */}
                        {view === "login" && (
                            <div className="max-w-md mx-auto bg-white rounded-3xl border border-slate-200 shadow-xl p-8 mt-12 animate-in fade-in duration-300">
                                <div className="text-center mb-8">
                                    <div className="w-12 h-12 bg-brand-50 border border-brand-200 text-brand-600 rounded-2xl flex items-center justify-center mx-auto mb-3">
                                        <SVG.Activity className="w-6 h-6" />
                                    </div>
                                    <h2 className="text-xl font-black text-slate-800 uppercase tracking-wider">Acesso ao FisioHub</h2>
                                    <p className="text-xs text-slate-400 mt-1">Prontuário e Gestão para Fisioterapeutas & Clínicas</p>
                                </div>

                                <div className="flex border-b border-slate-100 mb-6 font-bold text-xs">
                                    <button 
                                        onClick={() => setIsRegistering(false)} 
                                        className={`flex-1 pb-3 text-center transition-all ${!isRegistering ? 'border-b-2 border-brand-600 text-brand-700 font-black' : 'text-slate-400'}`}
                                    >
                                        Acessar Conta
                                    </button>
                                    <button 
                                        onClick={() => setIsRegistering(true)} 
                                        className={`flex-1 pb-3 text-center transition-all ${isRegistering ? 'border-b-2 border-brand-600 text-brand-700 font-black' : 'text-slate-400'}`}
                                    >
                                        Registrar Novo Perfil
                                    </button>
                                </div>

                                <form onSubmit={handleAuthSubmit} className="space-y-4 text-xs font-semibold">
                                    {isRegistering && (
                                        <div>
                                            <label className="block text-[10px] text-slate-400 uppercase mb-1.5">Nome do Profissional / Clínica *</label>
                                            <input type="text" required placeholder="Ex: Dra. Clarice Mendes ou Clínica Biosphera" value={authForm.name} onChange={(e) => setAuthForm({...authForm, name: e.target.value})} className="w-full px-3.5 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-brand-500" />
                                        </div>
                                    )}

                                    {isRegistering && (
                                        <div className="grid grid-cols-2 gap-3">
                                            <div>
                                                <label className="block text-[10px] text-slate-400 uppercase mb-1.5">Perfil de Conta</label>
                                                <select value={authForm.type} onChange={(e) => setAuthForm({...authForm, type: e.target.value})} className="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-brand-500">
                                                    <option value="fisioterapeuta">Fisioterapeuta</option>
                                                    <option value="clinica">Clínica</option>
                                                </select>
                                            </div>
                                            <div>
                                                <label className="block text-[10px] text-slate-400 uppercase mb-1.5">CREFITO *</label>
                                                <input type="text" required={authForm.type === "fisioterapeuta"} placeholder="Ex: 12345-F" disabled={authForm.type === "clinica"} value={authForm.crefito} onChange={(e) => setAuthForm({...authForm, crefito: e.target.value})} className="w-full px-3.5 py-2.5 bg-slate-50 border border-slate-200 rounded-xl disabled:bg-slate-100 disabled:text-slate-400 focus:outline-none focus:ring-2 focus:ring-brand-500" />
                                            </div>
                                        </div>
                                    )}

                                    <div>
                                        <label className="block text-[10px] text-slate-400 uppercase mb-1.5">E-mail de Acesso *</label>
                                        <input type="email" required placeholder="email@exemplo.com" value={authForm.email} onChange={(e) => setAuthForm({...authForm, email: e.target.value})} className="w-full px-3.5 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-brand-500" />
                                    </div>

                                    <div>
                                        <label className="block text-[10px] text-slate-400 uppercase mb-1.5">Senha de Segurança *</label>
                                        <input type="password" required placeholder="••••••••" value={authForm.password} onChange={(e) => setAuthForm({...authForm, password: e.target.value})} className="w-full px-3.5 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-brand-500" />
                                    </div>

                                    <button type="submit" className="w-full py-3 mt-4 bg-brand-600 hover:bg-brand-700 text-white font-black uppercase tracking-widest rounded-2xl transition-all shadow-md shadow-brand-500/10">
                                        {isRegistering ? "Confirmar Registro" : "Entrar no Sistema"}
                                    </button>
                                </form>

                                {/* BOTÕES DE ACESSO DE DEMONSTRAÇÃO (MVP ONBOARDING) */}
                                <div className="mt-8 pt-6 border-t border-slate-100 text-center">
                                    <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3">Ambiente de Demonstração (Onboarding Rápido)</p>
                                    <div className="flex flex-col sm:flex-row gap-2">
                                        <button 
                                            onClick={() => handleGenerateDemoAccount("fisioterapeuta")}
                                            className="flex-1 py-2 border border-brand-200 hover:bg-brand-50 text-brand-700 font-bold rounded-xl text-[10px] uppercase tracking-wider transition-all"
                                        >
                                            Demo Fisioterapeuta
                                        </button>
                                        <button 
                                            onClick={() => handleGenerateDemoAccount("clinica")}
                                            className="flex-1 py-2 border border-brand-200 hover:bg-brand-50 text-brand-700 font-bold rounded-xl text-[10px] uppercase tracking-wider transition-all"
                                        >
                                            Demo Clínica
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* --- VIEW 2: DASHBOARD (PRONTUÁRIOS, RECEPÇÃO & AGENDAMENTO) --- */}
                        {view === "dashboard" && activeAccount && !selectedPatientId && (
                            <div className="space-y-8 animate-in fade-in duration-300">
                                
                                {/* ADM / CLINIC HEADER */}
                                <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
                                    <div>
                                        <h2 className="text-base font-black text-slate-800 uppercase tracking-wider">Painel Central de Prontuários</h2>
                                        <p className="text-xs text-slate-400 mt-1">Busca inteligente de registros ativos de pacientes no sistema.</p>
                                    </div>

                                    <div className="flex flex-col sm:flex-row gap-3 w-full md:w-auto text-xs font-bold">
                                        <div className="relative w-full sm:w-64">
                                            <span className="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                                                <SVG.Search />
                                            </span>
                                            <input 
                                                type="text" 
                                                placeholder="Buscar por Nome ou CPF..." 
                                                value={searchTerm}
                                                onChange={(e) => setSearchTerm(e.target.value)}
                                                className="w-full pl-10 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-brand-500"
                                            />
                                        </div>

                                        {/* Fisioterapeutas podem criar avaliações privadas do zero */}
                                        {activeAccount.type === "fisioterapeuta" && (
                                            <button 
                                                onClick={handleStartPrivateWizard}
                                                className="px-5 py-2.5 bg-brand-600 hover:bg-brand-700 text-white font-black uppercase tracking-wider rounded-2xl transition-all flex items-center justify-center gap-2"
                                            >
                                                <SVG.Plus className="w-4 h-4" /> Nova Ficha Privada
                                            </button>
                                        )}
                                    </div>
                                </div>

                                {/* CLÍNICA RECEPÇÃO: PRÉ-CADASTRO E ENCAMINHAMENTO */}
                                {activeAccount.type === "clinica" && (
                                    <div className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm space-y-4">
                                        <h3 className="text-xs font-black text-brand-600 uppercase tracking-widest border-l-4 border-brand-500 pl-2">Acolhimento & Pré-Cadastro Recepção</h3>
                                        
                                        <form onSubmit={handleClinicPreRegister} className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4 text-xs font-semibold">
                                            <div>
                                                <label className="block text-[9px] text-slate-400 uppercase mb-1">Nome Completo do Paciente *</label>
                                                <input type="text" required placeholder="Nome completo" value={newAppoint.patientName} onChange={(e) => setNewAppoint({...newAppoint, patientName: e.target.value})} className="w-full px-3 py-2 bg-slate-50 border rounded-xl" />
                                            </div>
                                            <div>
                                                <label className="block text-[9px] text-slate-400 uppercase mb-1">Telefone Celular</label>
                                                <input type="text" placeholder="(11) 99999-9999" value={newAppoint.patientPhone} onChange={(e) => setNewAppoint({...newAppoint, patientPhone: e.target.value})} className="w-full px-3 py-2 bg-slate-50 border rounded-xl" />
                                            </div>
                                            <div>
                                                <label className="block text-[9px] text-slate-400 uppercase mb-1">Encaminhar ao Fisioterapeuta *</label>
                                                <select required value={newAppoint.physioId} onChange={(e) => setNewAppoint({...newAppoint, physioId: e.target.value})} className="w-full px-3 py-2 bg-slate-50 border rounded-xl bg-white">
                                                    <option value="">Selecione o Profissional...</option>
                                                    {currentClinicPhysios.map(p => (
                                                        <option key={p.crefito} value={p.crefito}>{p.name} (CREFITO: {p.crefito})</option>
                                                    ))}
                                                </select>
                                            </div>
                                            <div>
                                                <label className="block text-[9px] text-slate-400 uppercase mb-1">Tipo de Consulta</label>
                                                <select value={newAppoint.type} onChange={(e) => setNewAppoint({...newAppoint, type: e.target.value})} className="w-full px-3 py-2 bg-slate-50 border rounded-xl bg-white">
                                                    <option value="Avaliação">Avaliação Inicial</option>
                                                    <option value="Sessão">Sessão Regular</option>
                                                </select>
                                            </div>

                                            <div>
                                                <label className="block text-[9px] text-slate-400 uppercase mb-1">CPF do Paciente</label>
                                                <input type="text" placeholder="000.000.000-00" value={newAppoint.patientCpf || ""} onChange={(e) => setNewAppoint({...newAppoint, patientCpf: formatCPF(e.target.value)})} className="w-full px-3 py-2 bg-slate-50 border rounded-xl" />
                                            </div>
                                            <div>
                                                <label className="block text-[9px] text-slate-400 uppercase mb-1">Data de Nascimento</label>
                                                <input type="date" value={newAppoint.dateOfBirth || ""} onChange={(e) => setNewAppoint({...newAppoint, dateOfBirth: e.target.value})} className="w-full px-3 py-2 bg-slate-50 border rounded-xl" />
                                            </div>
                                            <div>
                                                <label className="block text-[9px] text-slate-400 uppercase mb-1">Agendar Data (Opcional)</label>

                                                            <span className={`inline-block px-2 py-0.5 rounded text-[9px] font-black uppercase ${p.isCompleted ? 'bg-emerald-50 text-emerald-800' : 'bg-amber-100 text-amber-950 animate-pulse'}`}>

                                                            </span>

                                                    <div className="mt-5 pt-3 border-t border-slate-50">

                                    </button>

                                    </div>

                                        <h2 className="text-lg font-black text-slate-800 uppercase tracking-wider">{activePatient.name}</h2>

                                    <button onClick={() => setPatientDetailTab("exercises")} className={`pb-2.5 transition-all ${patientDetailTab === 'exercises' ? 'border-b-2 border-brand-600 text-brand-700' : 'text-slate-400 hover:text-slate-600'}`}>Prescrever Exercícios</button>

                                {/* TAB 1: EVALUATION DETAILS */}
                                {patientDetailTab === "eval" && (

                                            {/* Informações Cadastrais */}

                                                    <div><span className="text-slate-400 font-bold uppercase text-[9px] block">Nome</span> <span className="font-bold text-slate-700">{activePatient.name}</span></div>
                                                    <div><span className="text-slate-400 font-bold uppercase text-[9px] block">CPF / RG</span> <span className="font-bold text-slate-700">{activePatient.cpf} / {activePatient.rg || 'N/D'}</span></div>
                                                    <div><span className="text-slate-400 font-bold uppercase text-[9px] block">Telefone / E-mail</span> <span className="font-semibold text-slate-700">{activePatient.phone} • {activePatient.email || 'N/D'}</span></div>

                                                </div>
                                            </div>

                                                    <div>
                                                        <span className="text-[9px] font-bold text-slate-400 uppercase">Peso</span>

                                                    </div>

                                                        <span className="text-[9px] font-bold text-slate-400 uppercase">Altura</span>

                                                </div>

                                                    <p className="text-slate-500 font-semibold"><strong className="text-slate-800 uppercase text-[9px]">Estilo de vida:</strong> Atividade: {activePatient.habitos?.atividade} | Tabaco: {activePatient.habitos?.tabagismo} | Sono: {activePatient.habitos?.sono} | Ergonomia: {activePatient.habitos?.ergonometrics || 'Sem especificidades'}</p>
                                                </div>
                                            </div>
                                        </div>

                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8 border-t pt-6">
                                            {/* Anamnese e Queixa Principal */}
                                            <div className="space-y-4">

                                                </div>
                                            </div>

                                            <div className="space-y-4">

                                                <div className="space-y-3 text-xs leading-normal font-semibold">
                                                    <div className="flex justify-between items-center bg-red-50 p-3 rounded-2xl border border-red-100">
                                                        <span className="text-[10px] font-black text-red-800 uppercase tracking-wider">Intensidade EVA Atual</span>
                                                        <span className="text-sm font-black text-red-700">{activePatient.dor?.intensidade}/10 ({activePatient.dor?.frequencia})</span>

                                                    {activePatient.dor?.mapaZonas && activePatient.dor.mapaZonas.length > 0 && (
                                                        <div><span className="font-bold text-slate-400 uppercase text-[9px] block">Regiões afetadas selecionadas</span> <div className="flex flex-wrap gap-1 mt-1.5">{activePatient.dor.mapaZonas.map(z => <span key={z} className="bg-amber-100 text-amber-950 font-black text-[9px] uppercase tracking-wide px-2 py-0.5 rounded-lg border border-amber-200">🔥 {z}</span>)}</div></div>
                                                    )}
                                                    {activePatient.dor?.localizacao && (
                                                        <div><span className="font-bold text-slate-400 uppercase text-[9px] block">Irradiação e detalhes descritivos da dor</span> <p className="text-slate-600 mt-1">{activePatient.dor.localizacao}</p></div>
                                                    )}
                                                </div>
                                            </div>
                                        </div>

                                        <div className="border-t pt-6">
                                            {/* Exame Físico */}
                                            <div className="space-y-4">
                                                <h3 className="text-xs font-black text-brand-600 uppercase tracking-widest border-l-4 border-brand-500 pl-2 mb-3">5. Exame Cinético-Funcional & Segmentos</h3>
                                                {activePatient.segmentosEvaluated && activePatient.segmentosEvaluated.length > 0 && (
                                                    <div className="bg-slate-50 p-4 rounded-2xl mb-4">
                                                        <p className="text-[10px] font-black text-slate-400 uppercase mb-2">Segmentação Muscular / ADM Articular</p>

                                                            {activePatient.segmentosEvaluated.map((seg, i) => (
                                                                <div key={i} className="bg-white p-2.5 rounded-xl border">
                                                                    <span className="font-black text-brand-700 block text-[11px] mb-1">{seg.nome}</span>

                                                                    <p className="text-slate-500">Força Muscular (MRC): <strong className="text-slate-800">{seg.forca}</strong></p>

                                                        </div>
                                                    </div>

                                                    <div className="space-y-3.5">
                                                        <div><span className="font-bold text-slate-400 uppercase text-[9px] block">Inspeção Visual</span> <p className="text-slate-700 font-semibold mt-1">{activePatient.exameFisico?.inspecao || "N/D"}</p></div>
                                                        <div><span className="font-bold text-slate-400 uppercase text-[9px] block">Palpação Local</span> <p className="text-slate-700 font-semibold mt-1">{activePatient.exameFisico?.palpacao || "N/D"}</p></div>
                                                    </div>
                                                    <div className="space-y-3.5">
                                                        <div><span className="font-bold text-slate-400 uppercase text-[9px] block">Sensibilidade Cutânea</span> <p className="text-slate-700 font-semibold mt-1">{activePatient.exameFisico?.sensibilidade || "N/D"}</p></div>
                                                        <div><span className="font-bold text-slate-400 uppercase text-[9px] block">Testes Ortopédicos Clínicos</span> <p className="text-slate-700 font-bold text-brand-600 mt-1">{activePatient.exameFisico?.testes || "N/D"}</p></div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>

                                        {/* Escalas Clínicas Adicionais */}
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8 border-t pt-6">
                                            <div className="space-y-4">

                                                    </div>
                                                    <div className="bg-slate-50 p-3.5 rounded-2xl">
                                                        <span className="text-slate-400 uppercase text-[9px]">Índice de Barthel (Funcionalidade)</span>

                                                                        <strong>{item.musculo}:</strong> <span className="text-brand-700">{item.grau}</span>
                                                                    </div>
                                                                ))}
                                                            </div>
                                                        </div>
                                                    )}
                                                </div>
                                            </div>

                                            {/* Diagnóstico Cinesioterapêutico */}
                                            <div className="space-y-4">
                                                <h3 className="text-xs font-black text-brand-600 uppercase tracking-widest border-l-4 border-brand-500 pl-2 mb-3">7. Planejamento Terapêutico Proposto</h3>
                                                <div className="space-y-3.5 text-xs leading-relaxed font-semibold">
                                                    <div><span className="font-bold text-slate-400 uppercase text-[9px] block">Diagnóstico Cinesioterapêutico</span> <p className="text-slate-800 mt-1">{activePatient.diagnosticoCinesio || "Não informado"}</p></div>
                                                    <div><span className="font-bold text-slate-400 uppercase text-[9px] block">Metas / Objetivos Clínicos</span> <p className="text-slate-800 mt-1">{activePatient.objetivos || "Não informado"}</p></div>
                                                    <div><span className="font-bold text-slate-400 uppercase text-[9px] block">Conduta do Consultório</span> <p className="text-slate-800 mt-1">{activePatient.conduta || "Não informado"}</p></div>
                                                </div>
                                            </div>
                                        </div>

                                        {/* SIGNATURE SECTION FOR PRINT ONLY */}
                                        <div className="hidden print:grid grid-cols-2 gap-12 text-center pt-20 text-xs font-bold uppercase tracking-wider">
                                            <div>
                                                <div className="border-b border-slate-400 mx-6 pb-1"></div>
                                                <p className="text-slate-700 mt-2">{activePatient.name}</p>

                                                <div className="border-b border-slate-400 mx-6 pb-1"></div>

                                                <span className="text-[10px] text-slate-400 font-bold block">CREFITO: {activePatient.therapistCrefito}</span>
                                            </div>
                                        </div>

                                        {/* Co-creation watermark */}
                                        <div className="pt-8 border-t border-slate-100 text-center text-[10px] text-slate-400 font-semibold uppercase tracking-wider no-print">

                                        </div>
                                    </div>
                                )}

                                {/* TAB 2: EVOLUTIONS JOURNAL */}
                                {patientDetailTab === "evolues" && (
                                    <div className="space-y-6">
                                        
                                        {/* ADD EVOLUTION FORM NO-PRINT */}
                                        {activeAccount.type === "fisioterapeuta" && (
                                            <div className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm space-y-4 no-print">
                                                <h3 className="text-xs font-black text-brand-600 uppercase tracking-widest border-l-4 border-brand-500 pl-2">Lançar Nova Evolução de Sessão</h3>
