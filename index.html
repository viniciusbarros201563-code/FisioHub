                                                    <div className="md:col-span-3">
                                                        <label className="block text-[10px] text-slate-400 uppercase mb-1.5">Descrição Clínica (Exercícios, Aparelhos, Comportamento)</label>
                                                        <textarea rows="2" required placeholder="Ex: Realizada terapia manual. Relata alívio na dor. Prescrevemos mobilização segmentar..." value={newEvolutionText} onChange={(e) => setNewEvolutionText(e.target.value)} className="w-full px-3.5 py-2.5 bg-slate-50 border rounded-xl" />
                                                    </div>
                                                    <div className="flex flex-col justify-between">
                                                        <div>
                                                            <label className="block text-[10px] text-slate-400 uppercase mb-1.5">Nível EVA Atual: {newEvolutionPain}</label>
                                                            <input type="range" min="0" max="10" value={newEvolutionPain} onChange={(e) => setNewEvolutionPain(parseInt(e.target.value))} className="w-full h-1.5 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-brand-500 mt-2.5" />
                                                        </div>
                                                        <button type="submit" className="w-full py-2.5 bg-brand-600 hover:bg-brand-700 text-white font-black uppercase tracking-wider rounded-xl transition-all shadow-md shadow-brand-500/10">
                                                            Salvar Sessão
                                                        </button>
                                                    </div>
                                                </form>
                                            </div>
                                        )}

                                        {/* EVOLUTIONS JOURNAL TIMELINE */}
                                        <div className="bg-white rounded-3xl border p-8 space-y-8 print-area shadow-sm">
                                            <div className="hidden print:block text-center border-b pb-6">
                                                <h2 className="text-xl font-black text-brand-950 uppercase tracking-widest">Histórico de Atendimentos Clínicos (Evoluções)</h2>
                                                <p className="text-xs text-slate-500 font-bold uppercase mt-1">Histórico Completo do Prontuário</p>
                                                <p className="text-xs text-slate-400 mt-1">Paciente: {activePatient.name} | CPF: {activePatient.cpf}</p>
                                            </div>

                                            {(!activePatient.evolutions || activePatient.evolutions.length === 0) ? (
                                                <div className="text-center py-12 text-slate-400">
                                                    <SVG.Clipboard className="w-10 h-10 mx-auto text-slate-300 mb-2" />
                                                    <p className="text-xs font-black uppercase tracking-wider">Nenhuma evolução registrada para este prontuário.</p>
                                                </div>
                                            ) : (
                                                <div className="relative border-l-2 border-slate-100 ml-4 pl-6 space-y-6">
                                                    {activePatient.evolutions.map((ev, index) => (
                                                        <div key={ev.id} className="relative">
                                                            {/* Bullet */}
                                                            <span className="absolute -left-[31px] top-1.5 h-4 w-4 rounded-full bg-teal-100 border-4 border-white"></span>
                                                            
                                                            <div className="bg-slate-50 p-5 rounded-2xl border border-slate-100/50 space-y-2 text-xs leading-normal">
                                                                <div className="flex justify-between items-center border-b border-dashed pb-2 mb-2">
                                                                    <div className="flex items-center gap-2">
                                                                        <span className="bg-brand-50 text-brand-700 font-black text-[9px] uppercase px-2 py-0.5 rounded-md">Atendimento</span>
                                                                        <span className="font-black text-slate-800">{ev.date}</span>
                                                                    </div>
                                                                    <span className="bg-red-50 text-red-700 font-black text-[9px] uppercase px-2 py-0.5 rounded-md border border-red-100">EVA da Sessão: {ev.pain}/10</span>
                                                                </div>
                                                                <p className="text-slate-700 font-semibold whitespace-pre-wrap leading-relaxed">{ev.text}</p>
                                                                <p className="text-[9px] text-slate-400 font-black uppercase tracking-widest text-right pt-1">Fisioterapeuta Técnico: {ev.therapist}</p>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                )}

                                {/* TAB 3: EXERCISES PRESCRIBER */}
                                {patientDetailTab === "exercises" && (
                                    <div className="bg-white rounded-3xl border p-8 space-y-6 shadow-sm">
                                        <div>
                                            <h3 className="text-xs font-black text-brand-600 uppercase tracking-widest border-l-4 border-brand-500 pl-2">Prescrever Atividades Domiciliares</h3>
                                            <p className="text-xs text-slate-400 mt-1">Selecione exercícios da biblioteca clínica para enviar ao paciente.</p>
                                        </div>

                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            {EXERCISES_LIBRARY.map(ex => (
                                                <div key={ex.id} className="p-4 bg-slate-50 border rounded-2xl flex flex-col justify-between">
                                                    <div>
                                                        <span className="bg-brand-100 text-brand-950 font-black text-[9px] uppercase tracking-wider px-2 py-0.5 rounded-lg">{ex.cat}</span>
                                                        <h4 className="font-black text-slate-800 text-sm mt-2">{ex.name}</h4>
                                                        <p className="text-xs text-slate-500 mt-1">{ex.desc}</p>
                                                    </div>
                                                    <div className="mt-4 pt-3 border-t flex justify-between items-center text-[10px] font-bold text-slate-500">
                                                        <span>Séries: {ex.sets} | Repetições: {ex.reps}</span>
                                                        <button 
                                                            onClick={() => triggerToast(`Prescrição de "${ex.name}" enviada para o canal móvel do paciente.`)}
                                                            className="bg-brand-600 text-white px-3 py-1.5 rounded-xl uppercase text-[9px] tracking-widest font-black"
                                                        >
                                                            Prescrever
                                                        </button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* --- VIEW 4: SEÇÃO "MINHA EQUIPE" (GERENCIAMENTO DE CLÍNICAS) --- */}
                        {view === "my-team" && activeAccount?.type === "clinica" && (
                            <div className="space-y-6 animate-in fade-in duration-300">
                                <div className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                                    <div>
                                        <h2 className="text-base font-black text-slate-800 uppercase tracking-wider">Fisioterapeutas Vinculados</h2>
                                        <p className="text-xs text-slate-400 mt-1">Cadastre e vincule profissionais credenciados para delegar e encaminhar avaliações.</p>
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                    {/* Formulário de Vínculo */}
                                    <div className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm space-y-4">
                                        <h3 className="text-xs font-black text-brand-600 uppercase tracking-widest border-l-4 border-brand-500 pl-2">Vincular Novo Profissional</h3>
                                        
                                        <form onSubmit={handleAddPhysio} className="space-y-3.5 text-xs font-semibold">
                                            <div>
                                                <label className="block text-[9px] text-slate-400 uppercase mb-1">Nome Completo do Fisioterapeuta *</label>
                                                <input type="text" required placeholder="Ex: Dr. Henrique Vasconcelos" value={newPhysio.name} onChange={(e) => setNewPhysio({...newPhysio, name: e.target.value})} className="w-full px-3 py-2 bg-slate-50 border rounded-xl" />
                                            </div>
                                            <div>
                                                <label className="block text-[9px] text-slate-400 uppercase mb-1">CREFITO de Registro *</label>
                                                <input type="text" required placeholder="Ex: 123456-F" value={newPhysio.crefito} onChange={(e) => setNewPhysio({...newPhysio, crefito: e.target.value})} className="w-full px-3 py-2 bg-slate-50 border rounded-xl" />
                                            </div>
                                            <div>
                                                <label className="block text-[9px] text-slate-400 uppercase mb-1">E-mail Comercial</label>
                                                <input type="email" placeholder="fisio@clinica.com" value={newPhysio.email} onChange={(e) => setNewPhysio({...newPhysio, email: e.target.value})} className="w-full px-3 py-2 bg-slate-50 border rounded-xl" />
                                            </div>

                                            <button type="submit" className="w-full py-2.5 bg-brand-600 hover:bg-brand-700 text-white font-black uppercase tracking-wider rounded-xl transition-all">
                                                Salvar Vínculo Equipe
                                            </button>
                                        </form>
                                    </div>

                                    {/* Listagem de Membros Ativos */}
                                    <div className="md:col-span-2 bg-white p-6 rounded-3xl border border-slate-100 shadow-sm space-y-4">
                                        <h3 className="text-xs font-black text-brand-600 uppercase tracking-widest border-l-4 border-brand-500 pl-2">Corpo Clínico Ativo ({currentClinicPhysios.length})</h3>

                                        {currentClinicPhysios.length === 0 ? (
                                            <div className="text-center py-12 text-slate-400">
                                                <SVG.Users className="w-8 h-8 mx-auto text-slate-300 mb-2" />
                                                <p className="text-xs font-black uppercase tracking-wider">Sua equipe está vazia.</p>
                                                <p className="text-[9px] mt-1">Preencha o painel lateral para cadastrar os seus profissionais parceiros.</p>
                                            </div>
                                        ) : (
                                            <div className="space-y-3">
                                                {currentClinicPhysios.map(p => (
                                                    <div key={p.id} className="p-3.5 bg-slate-50 hover:bg-slate-100/50 border rounded-2xl flex items-center justify-between text-xs transition-colors">
                                                        <div>
                                                            <h4 className="font-black text-slate-800">{p.name}</h4>
                                                            <p className="text-[10px] text-slate-400 font-bold uppercase mt-0.5">CREFITO: {p.crefito} • {p.email || 'Sem e-mail'}</p>
                                                        </div>
                                                        <button 
                                                            onClick={() => handleRemovePhysio(p.crefito)}
                                                            className="p-1.5 text-slate-400 hover:text-red-500 hover:bg-white rounded-lg transition-all"
                                                            title="Desvincular profissional"
                                                        >
                                                            <SVG.Trash className="w-4 h-4" />
                                                        </button>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* --- VIEW 5: FINANCEIRO (LANÇAMENTOS & FLUXO DE CAIXA) --- */}
                        {view === "finances" && activeAccount && (
                            <div className="space-y-6 animate-in fade-in duration-300">
                                <div className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
                                    <h2 className="text-base font-black text-slate-800 uppercase tracking-wider">Gestão Financeira & Balanço Geral</h2>
                                    <p className="text-xs text-slate-400 mt-1">Acompanhe receitas, despesas e fluxo de caixa simplificado do seu caixa.</p>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                    {/* Balanço rápido */}
                                    <div className="bg-emerald-50 p-5 rounded-3xl border border-emerald-100 text-xs font-semibold space-y-1">
                                        <span className="text-emerald-800 uppercase text-[9px] font-black tracking-wider">Entradas / Receitas</span>
                                        <p className="text-xl font-black text-emerald-950">R$ {financialStats.receitas.toLocaleString("pt-BR", { minimumFractionDigits: 2 })}</p>
                                    </div>
                                    <div className="bg-red-50 p-5 rounded-3xl border border-red-100 text-xs font-semibold space-y-1">
                                        <span className="text-red-800 uppercase text-[9px] font-black tracking-wider">Saídas / Despesas</span>
                                        <p className="text-xl font-black text-red-950">R$ {financialStats.despesas.toLocaleString("pt-BR", { minimumFractionDigits: 2 })}</p>
                                    </div>
                                    <div className="bg-brand-50 p-5 rounded-3xl border border-brand-100 text-xs font-semibold space-y-1">
                                        <span className="text-brand-800 uppercase text-[9px] font-black tracking-wider">Saldo de Caixa</span>
                                        <p className="text-xl font-black text-brand-950">R$ {financialStats.saldo.toLocaleString("pt-BR", { minimumFractionDigits: 2 })}</p>
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                    {/* Lançamento manual */}
                                    <div className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm space-y-4">
                                        <h3 className="text-xs font-black text-brand-600 uppercase tracking-widest border-l-4 border-brand-500 pl-2">Registrar Movimentação</h3>
                                        
                                        <form onSubmit={handleAddTransaction} className="space-y-3.5 text-xs font-semibold">
                                            <div>
                                                <label className="block text-[9px] text-slate-400 uppercase mb-1">Tipo de Operação</label>
                                                <select value={newTransaction.type} onChange={(e) => setNewTransaction({...newTransaction, type: e.target.value})} className="w-full px-3 py-2 bg-slate-50 border rounded-xl bg-white">
                                                    <option value="receita">Receita (+) </option>
                                                    <option value="despesa">Despesa (-) </option>
                                                </select>
                                            </div>
                                            <div>
                                                <label className="block text-[9px] text-slate-400 uppercase mb-1">Descrição</label>
                                                <input type="text" required placeholder="Ex: Avaliação Clinica Sr. Arthur" value={newTransaction.description} onChange={(e) => setNewTransaction({...newTransaction, description: e.target.value})} className="w-full px-3 py-2 bg-slate-50 border rounded-xl" />
                                            </div>
                                            <div>
                                                <label className="block text-[9px] text-slate-400 uppercase mb-1">Valor (R$)</label>
                                                <input type="number" step="0.01" required placeholder="0.00" value={newTransaction.val} onChange={(e) => setNewTransaction({...newTransaction, val: e.target.value})} className="w-full px-3 py-2 bg-slate-50 border rounded-xl" />
                                            </div>
                                            <div>
                                                <label className="block text-[9px] text-slate-400 uppercase mb-1">Forma de Liquidação</label>
                                                <select value={newTransaction.method} onChange={(e) => setNewTransaction({...newTransaction, method: e.target.value})} className="w-full px-3 py-2 bg-slate-50 border rounded-xl bg-white">
                                                    <option value="PIX">PIX</option>
                                                    <option value="Cartão Crédito">Cartão de Crédito</option>
                                                    <option value="Convênio">Repasse de Convênio</option>
                                                    <option value="Dinheiro">Dinheiro Físico</option>
                                                </select>
                                            </div>

                                            <button type="submit" className="w-full py-2.5 bg-brand-600 hover:bg-brand-700 text-white font-black uppercase tracking-wider rounded-xl transition-all">
                                                Confirmar Transação
                                            </button>
                                        </form>
                                    </div>

                                    {/* Histórico financeiro */}
                                    <div className="md:col-span-2 bg-white p-6 rounded-3xl border border-slate-100 shadow-sm space-y-4">
                                        <h3 className="text-xs font-black text-brand-600 uppercase tracking-widest border-l-4 border-brand-500 pl-2 font-bold">Extrato de Lançamentos Recentes</h3>

                                        {financials.filter(f => f.createdBy === activeAccount.id).length === 0 ? (
                                            <div className="text-center py-12 text-slate-400">
                                                <SVG.Dollar className="w-8 h-8 mx-auto text-slate-300 mb-2" />
                                                <p className="text-xs font-black uppercase tracking-wider">Sem transações registradas.</p>
                                            </div>
                                        ) : (
                                            <div className="space-y-3 max-h-[350px] overflow-y-auto pr-1">
                                                {financials.filter(f => f.createdBy === activeAccount.id).map(f => (
                                                    <div key={f.id} className="p-3.5 bg-slate-50 border rounded-2xl flex items-center justify-between text-xs font-semibold">
                                                        <div>
                                                            <p className="text-slate-800">{f.description}</p>
                                                            <span className="text-[9px] text-slate-400 font-bold uppercase tracking-wide">{f.date} • {f.method}</span>
                                                        </div>
                                                        <span className={`font-black tracking-wide ${f.type === 'receita' ? 'text-emerald-600' : 'text-red-500'}`}>
                                                            {f.type === 'receita' ? '+' : '-'} R$ {f.val.toLocaleString("pt-BR", { minimumFractionDigits: 2 })}
                                                        </span>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* --- VIEW 6: AUDITORIA & SEGURANÇA --- */}
                        {view === "audit-logs" && activeAccount && (
                            <div className="space-y-6 animate-in fade-in duration-300">
                                <div className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
                                    <h2 className="text-base font-black text-slate-800 uppercase tracking-wider">Histórico de Auditoria & Logs de Acesso</h2>
                                    <p className="text-xs text-slate-400 mt-1">Rastreabilidade completa de todas as operações efetuadas nos prontuários (LGPD).</p>
                                </div>

                                <div className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
                                    {logs.length === 0 ? (
                                        <div className="text-center py-12 text-slate-400">
                                            <SVG.Shield className="w-8 h-8 mx-auto text-slate-300 mb-2" />
                                            <p className="text-xs font-black uppercase tracking-wider">Sem logs de atividade disponíveis.</p>
                                        </div>
                                    ) : (
                                        <div className="space-y-3.5 max-h-[500px] overflow-y-auto pr-1 text-xs">
                                            {logs.map(log => (
                                                <div key={log.id} className="p-3.5 bg-slate-50 border border-slate-100 rounded-2xl flex flex-col sm:flex-row justify-between sm:items-center gap-2 font-medium">
                                                    <div>
                                                        <span className="inline-block bg-brand-50 border border-brand-100 text-brand-800 font-black text-[9px] uppercase px-2 py-0.5 rounded-md mb-1.5">{log.user} ({log.type})</span>
                                                        <p className="text-slate-700 font-semibold">{log.description}</p>
                                                    </div>
                                                    <span className="text-[10px] text-slate-400 font-black text-right whitespace-nowrap">{log.date}</span>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {/* --- VIEW 7: WIZARD DE AVALIAÇÃO EM 7 PASSOS --- */}
                        {view === "wizard" && activeAccount && (
                            <div className="max-w-4xl mx-auto bg-white rounded-3xl border shadow-xl overflow-hidden animate-in fade-in duration-300">
                                
                                {/* Progress header */}
                                <div className="bg-slate-900 text-white px-8 py-5 flex justify-between items-center text-xs font-black uppercase tracking-wider border-b border-slate-800">
                                    <span className="text-brand-400">Passo {wizardStep} de 7</span>
                                    <span className="text-slate-400 text-[10px]">
                                        {wizardStep === 1 && "1. Identificação Geral"}
                                        {wizardStep === 2 && "2. Queixa & Histórico"}
                                        {wizardStep === 3 && "3. Comorbidades & Hábitos"}
                                        {wizardStep === 4 && "4. Sinais Vitais & Palpação"}
                                        {wizardStep === 5 && "5. Segmentos, Força & ADM"}
                                        {wizardStep === 6 && "6. Escalas Clínicas (Ashworth, Berg, Barthel)"}
                                        {wizardStep === 7 && "7. Diagnóstico & Agenda"}
                                    </span>
                                </div>

                                {/* Step Bar */}
                                <div className="grid grid-cols-7 h-1 w-full bg-slate-100">
                                    {[1, 2, 3, 4, 5, 6, 7].map(st => (
                                        <div key={st} className={`h-full transition-all duration-300 ${st <= wizardStep ? 'bg-brand-500' : 'bg-slate-200'}`} />
                                    ))}
                                </div>

                                <form onSubmit={handleSaveWizard} className="p-6 md:p-8 space-y-6">
                                    
                                    {/* PASSO 1: IDENTIFICAÇÃO DO PACIENTE */}
                                    {wizardStep === 1 && (
                                        <div className="space-y-6">
                                            <h3 className="text-base font-extrabold text-slate-800 border-b pb-2">1. Dados Cadastrais Básicos</h3>
                                            
                                            <div className="grid grid-cols-1 sm:grid-cols-3 gap-4 text-xs font-semibold">
                                                <div className="sm:col-span-2">
                                                    <label className="block text-[10px] text-slate-400 uppercase mb-1">Nome do Paciente *</label>
                                                    <input type="text" required disabled={wizardType === "clinic-complete"} placeholder="Nome completo" value={wizardForm.name} onChange={(e) => setWizardForm({...wizardForm, name: e.target.value})} className="w-full px-3.5 py-2.5 bg-slate-50 disabled:bg-slate-100 border border-slate-200 rounded-xl" />
                                                </div>
                                                <div>
                                                    <label className="block text-[10px] text-slate-400 uppercase mb-1">CPF (Formatação automática) *</label>
                                                    <input type="text" required disabled={wizardType === "clinic-complete"} placeholder="000.000.000-00" value={wizardForm.cpf} onChange={(e) => setWizardForm({...wizardForm, cpf: formatCPF(e.target.value)})} className="w-full px-3.5 py-2.5 bg-slate-50 disabled:bg-slate-100 border border-slate-200 rounded-xl" />
                                                </div>
                                            </div>

                                            <div className="grid grid-cols-1 sm:grid-cols-3 gap-4 text-xs font-semibold">
                                                <div>
                                                    <label className="block text-[10px] text-slate-400 uppercase mb-1">Nascimento *</label>
                                                    <input type="date" required disabled={wizardType === "clinic-complete"} value={wizardForm.birthDate} onChange={(e) => {
                                                        const bDate = e.target.value;
                                                        setWizardForm({ ...wizardForm, birthDate: bDate, age: calculateAge(bDate) });
                                                    }} className="w-full px-3.5 py-2.5 bg-slate-50 disabled:bg-slate-100 border border-slate-200 rounded-xl" />
                                                </div>
                                                <div>
                                                    <label className="block text-[10px] text-slate-400 uppercase mb-1">Idade calculada</label>
                                                    <input type="text" disabled value={wizardForm.age ? `${wizardForm.age} anos` : ""} className="w-full px-3.5 py-2.5 bg-slate-100 border border-slate-200 rounded-xl text-slate-500 font-bold" />
                                                </div>
                                                <div>
                                                    <label className="block text-[10px] text-slate-400 uppercase mb-1">Sexo *</label>
                                                    <select disabled={wizardType === "clinic-complete"} value={wizardForm.gender} onChange={(e) => setWizardForm({...wizardForm, gender: e.target.value})} className="w-full px-3 py-2.5 bg-slate-50 disabled:bg-slate-100 border border-slate-200 rounded-xl bg-white">
                                                        <option value="M">Masculino</option>
                                                        <option value="F">Feminino</option>
                                                        <option value="Outro">Outro</option>
                                                    </select>
                                                </div>
                                            </div>

                                            <div className="grid grid-cols-1 sm:grid-cols-3 gap-4 text-xs font-semibold">
                                                <div>
                                                    <label className="block text-[10px] text-slate-400 uppercase mb-1">RG</label>
                                                    <input type="text" placeholder="Registro Geral" value={wizardForm.rg || ""} onChange={(e) => setWizardForm({...wizardForm, rg: e.target.value})} className="w-full px-3.5 py-2.5 bg-slate-50 border border-slate-200 rounded-xl" />
                                                </div>
                                                <div>
                                                    <label className="block text-[10px] text-slate-400 uppercase mb-1">Telefone Celular *</label>
                                                    <input type="text" required placeholder="(11) 99999-9999" value={wizardForm.phone} onChange={(e) => setWizardForm({...wizardForm, phone: e.target.value})} className="w-full px-3.5 py-2.5 bg-slate-50 border border-slate-200 rounded-xl" />
                                                </div>
                                                <div>
                                                    <label className="block text-[10px] text-slate-400 uppercase mb-1">E-mail</label>
                                                    <input type="email" placeholder="paciente@exemplo.com" value={wizardForm.email || ""} onChange={(e) => setWizardForm({...wizardForm, email: e.target.value})} className="w-full px-3.5 py-2.5 bg-slate-50 border border-slate-200 rounded-xl" />
                                                </div>
                                            </div>

                                            </div>
                                        </div>

                                                <div>
                                                    <label className="block text-[10px] text-slate-400 uppercase mb-1.5">Queixa Principal (QP - Com as palavras do paciente) *</label>

                                                    <div>
                                                        <label className="block text-[9px] text-slate-500 mb-1">Medicamentos relevantes de uso regular</label>

                                                        <option value="Boa">Boa (Repousante)</option>
                                                        <option value="Regular">Regular (Desperta dor)</option>

                                        </div>

                                                                        const updated = wizardForm.segmentosEvaluated.map(s => s.id === seg.id ? { ...s, nome: e.target.value } : s);

                                                                    <option value="Coluna Cervical">Coluna Cervical</option>
                                                                    <option value="Coluna Torácica">Coluna Torácica</option>

                                                                    <option value="Ombro Esquerdo">Ombro Esquerdo</option>

                                                                    <option value="Tornozelo Direito">Tornozelo Direito</option>

                                                                        const updated = wizardForm.segmentosEvaluated.map(s => s.id === seg.id ? { ...s, adm: e.target.value } : s);
                                                                        setWizardForm({ ...wizardForm, segmentosEvaluated: updated });

                                                                    value={seg.forca}

                                                                        const updated = wizardForm.segmentosEvaluated.map(s => s.id === seg.id ? { ...s, forca: e.target.value } : s);
                                                                        setWizardForm({ ...wizardForm, segmentosEvaluated: updated });
                                                                    }}
                                                                    className="w-full px-2.5 py-2 bg-white border rounded-lg font-bold"
                                                                >
                                                                    <option value="Grau 5 - Força Normal">Grau 5 - Força Normal</option>

                                                                </select>
                                                            </div>
                                                        </div>

                                                                placeholder="Ex: Flexão limitada a 90º com dor na amplitude final." 
                                                                value={seg.anotacao}
                                                                onChange={(e) => {
                                                                    const updated = wizardForm.segmentosEvaluated.map(s => s.id === seg.id ? { ...s, anotacao: e.target.value } : s);
                                                                    setWizardForm({ ...wizardForm, segmentosEvaluated: updated });

                                                    </div>

                                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 border-t pt-4 text-xs font-semibold">

                                                </div>

                                                </div>

                                                <div className="bg-slate-50 p-4 rounded-2xl border space-y-2">
                                                    <div className="flex justify-between items-center">
                                                        <span className="text-slate-700 font-bold">Funcionalidade Barthel (0 a 100)</span>
                                                        <span className="font-bold text-blue-600">{wizardForm.scales.barthel} pts</span>
                                                    </div>
                                                    <input type="range" min="0" max="100" value={wizardForm.scales.barthel} onChange={(e) => setWizardForm({...wizardForm, scales: {...wizardForm.scales, barthel: parseInt(e.target.value)}})} className="w-full accent-blue-500" />
                                                </div>
                                            </div>

                                            <div className="bg-slate-50 p-5 rounded-2xl border text-xs font-semibold space-y-4">
                                                <div className="flex justify-between items-center border-b pb-2">
                                                    <p className="text-[10px] text-slate-400 font-black uppercase tracking-wider">Tônus de Espasticidade (Escala de Ashworth)</p>
                                                    <button 
                                                        type="button"
                                                        onClick={() => {
                                                            const newAsh = { id: "ash-" + Date.now(), musculo: "Flexores do Cotovelo", grau: "Grau 0 - Sem aumento de tônus" };
                                                            setWizardForm({
                                                                ...wizardForm,
                                                                ashworthEvaluated: [...(wizardForm.ashworthEvaluated || []), newAsh]
                                                            });
                                                        }}
                                                        className="px-2 py-1 bg-white border hover:bg-slate-100 text-brand-700 text-[9px] font-black uppercase rounded-lg transition-all font-bold"
                                                    >
                                                        + Adicionar Músculo/Grupo
                                                    </button>
                                                </div>
                                                
                                                <div className="space-y-3 max-h-[220px] overflow-y-auto pr-1">
                                                    {(wizardForm.ashworthEvaluated || []).map((item, idx) => (
                                                        <div key={item.id} className="flex gap-2 items-center bg-white p-2 rounded-xl border relative">
                                                            <div className="grid grid-cols-2 gap-2 flex-grow">
                                                                <div>
                                                                    <label className="block text-[8px] text-slate-400 uppercase mb-0.5">Músculo Testado</label>
                                                                    <input 
                                                                        type="text" 
                                                                        placeholder="Ex: Flexores do Cotovelo" 
                                                                        value={item.musculo} 
                                                                        onChange={(e) => {
                                                                            const updated = wizardForm.ashworthEvaluated.map(a => a.id === item.id ? { ...a, musculo: e.target.value } : a);
                                                                            setWizardForm({ ...wizardForm, ashworthEvaluated: updated });
                                                                        }}
                                                                        className="w-full px-2 py-1 text-[11px] bg-slate-50 border rounded font-bold"
                                                                    />
                                                                </div>
                                                                <div>
                                                                    <label className="block text-[8px] text-slate-400 uppercase mb-0.5">Tônus Espasticidade</label>
                                                                    <select 
                                                                        value={item.grau} 
                                                                        onChange={(e) => {
                                                                            const updated = wizardForm.ashworthEvaluated.map(a => a.id === item.id ? { ...a, grau: e.target.value } : a);
                                                                            setWizardForm({ ...wizardForm, ashworthEvaluated: updated });
                                                                        }}
                                                                        className="w-full px-2 py-1 text-[11px] bg-slate-50 border rounded font-bold"
                                                                    >
                                                                        <option value="Grau 0 - Sem aumento de tônus">Grau 0 - Sem aumento de tônus</option>
                                                                        <option value="Grau 1 - Leve aumento de tônus no final do arco">Grau 1 - Leve aumento de tônus no final do arco</option>
                                                                        <option value="Grau 1+ - Leve aumento de tônus na metade do arco">Grau 1+ - Leve aumento de tônus na metade do arco</option>
                                                                        <option value="Grau 2 - Aumento marcante de tônus, movimento fácil">Grau 2 - Aumento marcante de tônus, movimento fácil</option>
                                                                        <option value="Grau 3 - Considerável aumento de tônus, movimento passivo difícil">Grau 3 - Considerável aumento de tônus, movimento passivo difícil</option>
                                                                        <option value="Grau 4 - Parte afetada rígida em flexão ou extensão">Grau 4 - Parte afetada rígida em flexão ou extensão</option>
                                                                    </select>
                                                                </div>
                                                            </div>
                                                            {wizardForm.ashworthEvaluated.length > 1 && (
                                                                <button 
                                                                    type="button" 
                                                                    onClick={() => {
                                                                        const updated = wizardForm.ashworthEvaluated.filter(a => a.id !== item.id);
                                                                        setWizardForm({ ...wizardForm, ashworthEvaluated: updated });
                                                                    }}
                                                                    className="p-1 text-red-500 hover:bg-red-50 rounded"
                                                                >
                                                                    <SVG.Trash className="w-3.5 h-3.5" />
                                                                </button>
                                                            )}
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    {/* PASSO 7: DIAGNÓSTICO, METAS & PLANEJAMENTO CINESIO */}
                                    {wizardStep === 7 && (
                                        <div className="space-y-6">
                                            <h3 className="text-base font-extrabold text-slate-800 border-b pb-2">7. Diagnóstico & Planejamento Cinesioterapêutico</h3>
                                            <div className="space-y-4 text-xs font-semibold">
                                                <div>
                                                    <label className="block text-[10px] text-slate-400 uppercase mb-1">Diagnóstico Cinesioterapêutico (Disfunções funcionais) *</label>
                                                    <input type="text" required placeholder="Ex: Limitação cinético-funcional por hipomobilidade articular lombar..." value={wizardForm.diagnosticoCinesio} onChange={(e) => setWizardForm({...wizardForm, diagnosticoCinesio: e.target.value})} className="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-xl" />
                                                </div>
                                                <div>
                                                    <label className="block text-[10px] text-slate-400 uppercase mb-1">Objetivos Clínicos Propostos (Metas curto/médio prazo) *</label>
                                                    <textarea rows="2" required placeholder="Ex: Analgesia e controle motor lombar (curto prazo), reequilíbrio muscular (médio prazo)..." value={wizardForm.objetivos} onChange={(e) => setWizardForm({...wizardForm, objetivos: e.target.value})} className="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl"></textarea>
                                                </div>
                                                <div>
                                                    <label className="block text-[10px] text-slate-400 uppercase mb-1">Conduta Fisioterapêutica Proposta (Procedimentos) *</label>
                                                    <textarea rows="2" required placeholder="Ex: Exercícios de estabilização profunda, mobilização articular, alongamento de cadeia posterior..." value={wizardForm.conduta} onChange={(e) => setWizardForm({...wizardForm, conduta: e.target.value})} className="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl"></textarea>
                                                </div>
                                            </div>

                                            {/* CARD DE AGENDAMENTO DE CONSULTA INICIAL */}
                                            <div className="mt-4 p-5 bg-brand-50 border border-brand-200 rounded-3xl space-y-4">
                                                <label className="flex items-center gap-2.5 cursor-pointer select-none">
                                                    <input 
                                                        type="checkbox" 
                                                        checked={scheduleFirstSession} 
                                                        onChange={(e) => setScheduleFirstSession(e.target.checked)} 
                                                        className="w-4.5 h-4.5 rounded text-brand-600 focus:ring-brand-500 cursor-pointer"
                                                    />
                                                    <span className="text-xs font-black text-brand-950 uppercase tracking-wide">Agendar primeira consulta deste paciente imediatamente?</span>
                                                </label>

                                                {scheduleFirstSession && (
                                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 text-xs font-semibold animate-in fade-in duration-200">
                                                        <div>
                                                            <label className="block text-[10px] text-brand-700 uppercase mb-1">Data de Atendimento</label>
                                                            <input 
                                                                type="date" 
                                                                required 
                                                                value={scheduledDate} 
                                                                onChange={(e) => setScheduledDate(e.target.value)} 
                                                                className="w-full px-3 py-2 bg-white border border-brand-200 rounded-xl font-bold"
                                                            />
                                                        </div>
                                                        <div>
                                                            <label className="block text-[10px] text-brand-700 uppercase mb-1">Horário</label>
                                                            <input 
                                                                type="time" 
                                                                required 
                                                                value={scheduledTime} 
                                                                onChange={(e) => setScheduledTime(e.target.value)} 
                                                                className="w-full px-3 py-2 bg-white border border-brand-200 rounded-xl font-bold"
                                                            />
                                                        </div>

                                                        {/* Painel Crítico de Conflito de Horário */}
                                                        {agendaConflict && (
                                                            <div className="sm:col-span-2 p-3 bg-red-100 text-red-800 border border-red-200 rounded-xl text-[11px] font-bold flex items-center gap-2 animate-pulse">
                                                                <span>{agendaConflict}</span>
                                                            </div>
                                                        )}
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    )}

                                    {/* Controles de Navegação do Wizard */}
                                    <div className="flex justify-between items-center border-t pt-5 mt-4 text-xs font-bold uppercase tracking-wider no-print">
                                        <button 
                                            type="button"
                                            disabled={wizardStep === 1}
                                            onClick={() => setWizardStep(prev => prev - 1)}
                                            className="px-5 py-2.5 bg-slate-50 hover:bg-slate-100 disabled:bg-slate-100 disabled:text-slate-300 border rounded-xl text-slate-500 font-bold transition-all"
                                        >
                                            Anterior
                                        </button>
                                        
                                        <div className="flex gap-2">
                                            <button 
                                                type="button" 
                                                onClick={() => { setView("dashboard"); setSelectedPatientId(null); }}
                                                className="px-4 py-2 hover:bg-slate-50 text-slate-500 rounded-xl font-bold transition-all"
                                            >
                                                Cancelar
                                            </button>
                                            
                                            {wizardStep < 7 ? (
                                                <button 
                                                    type="button"
                                                    onClick={() => {
                                                        if (wizardStep === 1 && (!wizardForm.name || !wizardForm.cpf)) {
                                                            triggerToast("Nome e CPF são necessários para continuar.", "error");
                                                            return;
                                                        }
                                                        setWizardStep(prev => prev + 1);
                                                    }}
                                                    className="px-5 py-2.5 bg-brand-600 hover:bg-brand-700 text-white font-black rounded-xl transition-all shadow-md shadow-brand-500/10"
                                                >
                                                    Avançar
                                                </button>
                                            ) : (
                                                <button 
                                                    type="submit"
                                                    className="px-5 py-2.5 bg-emerald-600 hover:bg-emerald-700 text-white font-black rounded-xl transition-all shadow-lg shadow-emerald-500/10"
                                                >
                                                    Concluir & Gravar
                                                </button>
                                            )}
                                        </div>
                                    </div>
                                </form>
                            </div>
                        )}

                    </main>

                    {/* FOOTER NO-PRINT */}
                    <footer className="bg-slate-900 border-t border-slate-800 text-slate-500 py-6 text-center text-xs font-semibold tracking-wider no-print mt-auto">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 space-y-1.5">
                            <p>FisioHub 2.0 • Plataforma Integrada de Prontuários & Gestão para Clínicas</p>
                            <p className="text-[10px] text-teal-400 font-black uppercase tracking-widest">Concebido e Desenvolvido em cocriação por Vinicius Barros do Anjos & Gemini (Google AI)</p>
                        </div>
                    </footer>
                </div>
            );
        }

        // Inicializando aplicação de forma definitiva e segura na div root
        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<FisioHubApp />);
    </script>
</body>
</html>
