                const numeric = value.replace(/\D/g, "");
                return numeric
                    .replace(/(\d{3})(\d)/, "$1.$2")
                    .replace(/(\d{3})(\d)/, "$1.$2")
                    .replace(/(\d{3})(\d{1,2})$/, "$1-$2")

                if (!dateString) return "";
                const today = new Date();
                const birthDate = new Date(dateString);
                let age = today.getFullYear() - birthDate.getFullYear();
                const m = today.getMonth() - birthDate.getMonth();
                if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) {
                    age--;
                }
                return age;
            };

            const filteredPatients = useMemo(() => {
                return patients.filter(p => 
                    p.nome.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    p.cpf.replace(/\D/g, "").includes(searchTerm.replace(/\D/g, ""))
                );

            const handleAcceptShare = () => {
                const novoPaciente = { ...notificacaoCompartilhada.paciente };
                setPatients(prev => [novoPaciente, ...prev]);

                if (step === 1 && (!formAvaliacao.nome || !formAvaliacao.cpf)) {

                                            <div>

                                                <div><strong>Género:</strong> <span class="text-slate-600">{selectedPatient.sexo === 'M' ? 'Masculino' : 'Feminino'}</span></div>

                                                    <div class="md:col-span-3 bg-slate-50 p-2 rounded-xl text-xs flex justify-between">

                                                        <div><strong>Tempo de evolução:</strong> <span class="text-slate-600">{selectedPatient.hda.tempo}</span></div>
                                                        <div class="md:col-span-2"><strong>Mecanismo de lesão:</strong> <span class="text-slate-600">{selectedPatient.hda.mecanismo || "Não relatado"}</span></div>

                                        </div>

                                        {/* Seção 3: Comorbidades, Histórico Social & Hábitos */}

                                                                    const labels = {
                                                                        has: "Hipertensão (HAS)",
                                                                        dm: "Diabetes (DM)",
                                                                        cardio: "Cardiopatia/Arritmia",
                                                                        respiratorios: "Distúrbio Respiratório",
                                                                        renais: "Problema Renal/Hepático",
                                                                        circulatorios: "Distúrbio Circulatório/TVP",
                                                                        reumaticas: "Doença Reumática",
                                                                        neoplasias: "Neoplasia/Câncer",
                                                                        neurologicos: "Distúrbio Neurológico"

                                                                    return <span key={key} class="px-2.5 py-1 bg-rose-50 border border-rose-200 text-rose-800 text-xs font-semibold rounded-lg">{labels[key]}</span>;

                                                                return null;
                                                            })}

                                                        </div>
                                                    </div>

                                                            <p><strong>Ingestão de Água:</strong> {selectedPatient.habitos.agua}</p>

                                            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mt-4 text-sm">

                                                            <div class="w-full bg-slate-100 h-4 rounded-full overflow-hidden flex">

                                                    <div class="text-xs space-y-1 bg-slate-50 p-3 rounded-lg">
                                                        <p><strong>Comportamento:</strong> {selectedPatient.dorFrequencia} • Maior intensidade no período da <strong>{selectedPatient.dorPeriodo}</strong></p>

                                                            <span class="text-slate-400 italic">Nenhuma zona selecionada</span>
                                                        )}
                                                    </div>
                                                    <p class="text-xs text-slate-500 mt-3"><strong>Irradiação e Caminho:</strong> {selectedPatient.dorLocalizacao || "Dor puramente pontual"}</p>
                                                </div>
                                            </div>
                                        </div>

                                        {/* Seção 5: Exame Físico Geral e Sinais Vitais */}
                                        {selectedPatient.exameFisico && (
                                            <div>
                                                <h3 class="text-lg font-bold text-slate-900 border-b border-slate-100 pb-2 flex items-center gap-2">

                                                </h3>

                                                    </div>
                                                    <div class="bg-slate-50 p-3 rounded-lg text-center">
                                                        <span class="text-xs font-semibold text-slate-500 block uppercase">Frequência Cardíaca</span>
                                                        <strong class="text-lg text-slate-800">{selectedPatient.sinaisVitais?.fc ? `${selectedPatient.sinaisVitais.fc} bpm` : "Não aferida"}</strong>
                                                    </div>
                                                    <div class="bg-slate-50 p-3 rounded-lg text-center">
                                                        <span class="text-xs font-semibold text-slate-500 block uppercase">Saturação ($SpO_2$)</span>

                                                </div>

                                                        <strong>Avaliação de Sensibilidade:</strong>

                                                    </div>

                                                        <strong>Avaliação de Reflexos:</strong>
                                                        <p class="text-slate-600 font-semibold">{selectedPatient.exameFisico.reflexos}</p>
                                                    </div>
                                                </div>
                                            </div>
                                        )}

                                        {/* Seção 6: Testes Especiais, ADM e Força */}

                                            <h3 class="text-lg font-bold text-slate-900 border-b border-slate-100 pb-2 flex items-center gap-2">

                                            </h3>
                                            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mt-4 text-sm">
                                                {/* Goniometria (ADM) */}

                                                    <strong class="text-emerald-700 block border-b pb-2 mb-2">Amplitude de Movimento (ADM)</strong>

                                                </div>

                                                        {selectedPatient.forca && selectedPatient.forca.length > 0 ? selectedPatient.forca.map((item, idx) => (
                                                            <div key={idx} class="text-xs flex justify-between items-center border-b border-slate-50 pb-1.5 last:border-b-0">
                                                                <span class="font-bold text-slate-700">{item.grupo}</span>
                                                                <span class="px-2 py-0.5 bg-emerald-50 text-emerald-800 rounded font-black">Grau {item.grau}/5</span>
                                                            </div>
                                                        )) : <p class="text-slate-400 italic">Sem dados de força registados.</p>}

                                                                </p>
                                                            </div>
                                                        )) : <p class="text-slate-400 italic">Nenhum teste específico aplicado.</p>}
                                                    </div>
                                                </div>
                                            </div>
                                        </div>

                                        {/* Seção 7: Planeamento Clínico */}
                                        <div>
                                            <h3 class="text-lg font-bold text-slate-900 border-b border-slate-100 pb-2 flex items-center gap-2">

                                                    <p class="text-slate-600 mt-1 bg-slate-50 p-3 rounded-lg border-l-4 border-emerald-500 font-medium">"{selectedPatient.diagnosticoCinesio || "Não preenchido"}"</p>

                                                <div>
                                                    <strong class="text-slate-800">Metas do Tratamento por Prazo:</strong>
                                                    <div class="space-y-2 text-xs mt-2 bg-slate-50 p-3 rounded-lg">
                                                        {selectedPatient.objetivos?.curto && <p><strong>Curto Prazo:</strong> {selectedPatient.objetivos.curto}</p>}
                                                        {selectedPatient.objetivos?.medio && <p><strong>Médio Prazo:</strong> {selectedPatient.objetivos.medio}</p>}
                                                        {selectedPatient.objetivos?.longo && <p><strong>Longo Prazo:</strong> {selectedPatient.objetivos.longo}</p>}
                                                    </div>
                                                </div>
                                                <div class="md:col-span-2">
                                                    <strong class="text-slate-800">Conduta Fisioterapêutica Planeada:</strong>
                                                    <p class="text-slate-600 mt-2 leading-relaxed bg-emerald-50/50 p-4 rounded-xl border border-emerald-100">{selectedPatient.conduta}</p>
                                                </div>
                                            </div>
                                            <div class="flex justify-between mt-4 p-3 bg-slate-100/50 rounded-lg text-xs font-semibold">
                                                <span>Frequência sugerida: <strong>{selectedPatient.frequencia} por semana</strong></span>
                                                <span>Previsão de reavaliação clínica em: <strong>{selectedPatient.reavaliacaoSessoes} sessões</strong></span>
                                            </div>
                                        </div>

                                        {/* Rodapé das Assinaturas de Impressão */}
                                        <div class="hidden print-only grid grid-cols-2 gap-12 pt-16 mt-16 text-center text-sm">
                                            <div>
                                                <div class="border-t border-slate-400 pt-2">{selectedPatient.nome}</div>
                                                <div class="text-xs text-slate-400 mt-1">Assinatura do Paciente</div>
                                            </div>
                                            <div>
                                                <div class="border-t border-slate-400 pt-2 font-bold">{perfil.nome}</div>
                                                <div class="text-xs text-slate-400 mt-1">CREFITO: {perfil.crefito} • Fisioterapeuta</div>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {/* VISUALIZAÇÃO: HISTÓRICO DE EVOLUÇÕES */}
                                {patientSubTab === "evolucoes" && (
                                    <div class="space-y-6">
                                        <div class="flex justify-between items-center no-print">
                                            <h3 class="text-xl font-bold text-slate-900">Histórico de Sessões</h3>
                                            <button 
                                                onClick={() => setShowEvolucaoModal(true)}
                                                class="px-4 py-2 bg-emerald-600 hover:bg-emerald-700 text-white rounded-xl text-sm font-semibold flex items-center gap-2 shadow-sm transition"
                                            >
                                                <Icon name="plus-circle" className="w-4 h-4" /> Registar Nova Sessão (Evolução)
                                            </button>
                                        </div>

                                        {selectedPatient.evolues.length === 0 ? (
                                            <div class="text-center py-12 bg-white rounded-2xl border border-slate-200">
                                                <div class="mx-auto mb-4 flex justify-center"><Icon name="clipboard-list" className="w-12 h-12 text-slate-300" /></div>
                                                <h3 class="text-lg font-bold text-slate-700">Nenhuma sessão registrada</h3>
                                                <p class="text-sm text-slate-400">Clique em "Registar Nova Sessão" para iniciar o histórico clínico.</p>
                                            </div>
                                        ) : (
                                            <div class="space-y-6 print-area">
                                                <div class="hidden print-only text-center border-b pb-6 mb-6">
                                                    <h1 class="text-3xl font-extrabold text-emerald-700">FISIOHUB</h1>
                                                    <p class="text-sm text-slate-500 font-bold uppercase mt-1">Histórico Clínico de Evoluções</p>
                                                    <p class="text-xs text-slate-400 mt-1">Paciente: {selectedPatient.nome} | CPF: {selectedPatient.cpf}</p>
                                                </div>

                                                {selectedPatient.evolues.map((ev, index) => (
                                                    <div key={ev.id} class="bg-white rounded-2xl border border-slate-200 p-6 shadow-sm hover:border-emerald-100 transition relative">
                                                        <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-2 border-b border-slate-100 pb-3 mb-4">
                                                            <div class="flex items-center gap-3">
                                                                <span class="w-8 h-8 rounded-full bg-emerald-50 text-emerald-700 flex items-center justify-center font-bold text-sm">
                                                                    #{selectedPatient.evolues.length - index}
                                                                </span>
                                                                <div>
                                                                    <h4 class="font-bold text-slate-900">{new Date(ev.data).toLocaleDateString('pt-PT', { day: 'numeric', month: 'long', year: 'numeric' })}</h4>
                                                                    <p class="text-xs text-slate-400">Profissional Responsável: {ev.profissional}</p>
                                                                </div>
                                                            </div>
                                                            <span class="inline-flex items-center gap-1 text-sm font-bold text-rose-600 bg-rose-50 px-2.5 py-1 rounded-full self-start sm:self-auto">
                                                                EVA da Sessão: {ev.dorAtual}
                                                            </span>
                                                        </div>

                                                        <div class="space-y-4 text-sm text-slate-700">
                                                            <div>
                                                                <strong class="text-slate-900 block font-semibold">Relato do Paciente (Subjetivo):</strong>
                                                                <p class="mt-1 text-slate-600 bg-slate-50 p-3 rounded-lg italic">"{ev.subjetivo}"</p>
                                                            </div>
                                                            <div>
                                                                <strong class="text-slate-900 block font-semibold">Conduta Realizada (Objetivo):</strong>
                                                                <p class="mt-1 text-slate-600 leading-relaxed">{ev.conduta}</p>
                                                            </div>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                        )}

                        {/* 2. FORMULÁRIO DE NOVA AVALIAÇÃO (MULTI-STEP COM 7 PASSOS) */}
                        {activeTab === "nova-avaliacao" && (
                            <div class="max-w-4xl mx-auto bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
                                {/* Barra de Progresso */}
                                <div class="bg-slate-900 px-8 py-4 flex justify-between items-center text-sm font-medium border-b border-slate-800">
                                    <span class="text-emerald-400 font-semibold">Passo {step} de 7</span>
                                    <div class="flex gap-1 h-2 bg-slate-800 w-44 rounded-full overflow-hidden">
                                        <div class="bg-emerald-500 transition-all duration-300" style={{ width: `${(step/7)*100}%` }}></div>
                                    </div>
                                </div>

                                {/* Conteúdo dos Passos */}
                                <div class="p-8">
                                    {/* PASSO 1: IDENTIFICAÇÃO DO PACIENTE */}
                                    {step === 1 && (
                                        <div class="space-y-6">
                                            <div class="border-b border-slate-100 pb-4 mb-4">
                                                <h3 class="text-lg font-bold text-slate-900">1. Identificação Geral</h3>
                                                <p class="text-sm text-slate-500">Dados demográficos básicos do prontuário.</p>
                                            </div>

                                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                                <div>
                                                    <label class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-2">Nome Completo</label>
                                                    <input type="text" placeholder="Ex: João Silva de Souza" value={formAvaliacao.nome} onChange={(e) => setFormAvaliacao({...formAvaliacao, nome: e.target.value})} class="w-full border border-slate-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-emerald-500 focus:outline-none text-sm font-medium" />
                                                </div>
                                                <div>
                                                    <label class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-2">CPF</label>
                                                    <input type="text" placeholder="000.000.000-00" value={formAvaliacao.cpf} onChange={(e) => setFormAvaliacao({...formAvaliacao, cpf: formatCPF(e.target.value)})} class="w-full border border-slate-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-emerald-500 focus:outline-none text-sm font-medium" />
                                                </div>
                                                <div>
                                                    <label class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-2">Data de Nascimento</label>
                                                    <input type="date" value={formAvaliacao.dataNascimento} onChange={(e) => setFormAvaliacao({...formAvaliacao, dataNascimento: e.target.value})} class="w-full border border-slate-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-emerald-500 focus:outline-none text-sm font-medium" />
                                                </div>
                                                <div class="grid grid-cols-2 gap-4">
                                                    <div>
                                                        <label class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-2">Sexo</label>
                                                        <select value={formAvaliacao.sexo} onChange={(e) => setFormAvaliacao({...formAvaliacao, sexo: e.target.value})} class="w-full border border-slate-200 rounded-xl px-4 py-3 bg-white focus:ring-2 focus:ring-emerald-500 focus:outline-none text-sm font-medium">
                                                            <option value="M">Masc</option>
                                                            <option value="F">Fem</option>
                                                        </select>
                                                    </div>
                                                    <div>
                                                        <label class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-2">Estado Civil</label>
                                                        <select value={formAvaliacao.estadoCivil} onChange={(e) => setFormAvaliacao({...formAvaliacao, estadoCivil: e.target.value})} class="w-full border border-slate-200 rounded-xl px-4 py-3 bg-white focus:ring-2 focus:ring-emerald-500 focus:outline-none text-sm font-medium">
                                                            <option value="Solteiro">Solteiro</option>
                                                            <option value="Casado">Casado</option>
                                                            <option value="Divorciado">Divorciado</option>
                                                            <option value="União Estável">União Estável</option>
                                                        </select>
                                                    </div>
                                                </div>
                                                <div>
                                                    <label class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-2">Profissão / Ocupação</label>
                                                    <input type="text" placeholder="Ex: Professor" value={formAvaliacao.profissao} onChange={(e) => setFormAvaliacao({...formAvaliacao, profissao: e.target.value})} class="w-full border border-slate-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-emerald-500 focus:outline-none text-sm font-medium" />
                                                </div>
                                                <div>
                                                    <label class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-2">Telefone</label>
                                                    <input type="text" placeholder="(82) 99999-9999" value={formAvaliacao.telefone} onChange={(e) => setFormAvaliacao({...formAvaliacao, telefone: e.target.value})} class="w-full border border-slate-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-emerald-500 focus:outline-none text-sm font-medium" />
                                                </div>
                                                <div>
                                                    <label class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-2">E-mail</label>
                                                    <input type="email" placeholder="paciente@email.com" value={formAvaliacao.email} onChange={(e) => setFormAvaliacao({...formAvaliacao, email: e.target.value})} class="w-full border border-slate-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-emerald-500 focus:outline-none text-sm font-medium" />
                                                </div>
                                                <div>
                                                    <label class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-2">Médico Solicitante</label>
                                                    <input type="text" placeholder="Dr. Nome (Especialidade)" value={formAvaliacao.medicoSolicitante} onChange={(e) => setFormAvaliacao({...formAvaliacao, medicoSolicitante: e.target.value})} class="w-full border border-slate-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-emerald-500 focus:outline-none text-sm font-medium" />
                                                </div>
                                                <div class="md:col-span-2">
                                                    <label class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-2">Endereço Residencial</label>
                                                    <input type="text" placeholder="Rua, Número, Bairro, Cidade - UF" value={formAvaliacao.endereco} onChange={(e) => setFormAvaliacao({...formAvaliacao, endereco: e.target.value})} class="w-full border border-slate-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-emerald-500 focus:outline-none text-sm font-medium" />
                                                </div>
                                                <div class="md:col-span-2">
                                                    <label class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-2">Diagnóstico Clínico (CID / Patologia)</label>
                                                    <input type="text" placeholder="Ex: Hérnia discal L5-S1" value={formAvaliacao.diagnosticoClinico} onChange={(e) => setFormAvaliacao({...formAvaliacao, diagnosticoClinico: e.target.value})} class="w-full border border-slate-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-emerald-500 focus:outline-none text-sm font-semibold" />
                                                </div>
                                                <div>
                                                    <label class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-2">Contato de Emergência</label>
                                                    <input type="text" placeholder="Nome (Grau de Parentesco)" value={formAvaliacao.emergenciaContato} onChange={(e) => setFormAvaliacao({...formAvaliacao, emergenciaContato: e.target.value})} class="w-full border border-slate-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-emerald-500 focus:outline-none text-sm font-medium" />
                                                </div>
                                                <div>
                                                    <label class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-2">Telefone de Emergência</label>
                                                    <input type="text" placeholder="(11) 90000-0000" value={formAvaliacao.emergenciaTelefone} onChange={(e) => setFormAvaliacao({...formAvaliacao, emergenciaTelefone: e.target.value})} class="w-full border border-slate-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-emerald-500 focus:outline-none text-sm font-medium" />
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    {/* PASSO 2: ANAMNESE E HDA */}
                                    {step === 2 && (
                                        <div class="space-y-6">
                                            <div class="border-b border-slate-100 pb-4 mb-4">
                                                <h3 class="text-lg font-bold text-slate-900">2. Anamnese Completa & HDA</h3>
                                                <p class="text-sm text-slate-500">Histórico detalhado da patologia referida.</p>
                                            </div>

                                            <div class="space-y-4">
                                                <div>
                                                    <label class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-2">Queixa Principal (QP) (Palavras do próprio paciente)</label>
                                                    <textarea rows="3" placeholder="Sinto uma dor profunda no quadril direito quando me deito..." value={formAvaliacao.queixaPrincipal} onChange={(e) => setFormAvaliacao({...formAvaliacao, queixaPrincipal: e.target.value})} class="w-full border border-slate-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-emerald-500 focus:outline-none text-sm font-medium"></textarea>
                                                </div>
                                                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                                    <div>
                                                        <label class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-2">Início dos sintomas</label>
                                                        <div class="flex gap-4 py-2">
                                                            <label class="inline-flex items-center text-sm font-medium text-slate-700 cursor-pointer">
                                                                <input type="radio" checked={formAvaliacao.hdaInicio === 'Súbito'} onChange={() => setFormAvaliacao({...formAvaliacao, hdaInicio: 'Súbito'})} class="w-4 h-4 text-emerald-600 border-slate-300 focus:ring-emerald-500 mr-2" />
                                                                Súbito
                                                            </label>
                                                            <label class="inline-flex items-center text-sm font-medium text-slate-700 cursor-pointer">
                                                                <input type="radio" checked={formAvaliacao.hdaInicio === 'Gradual'} onChange={() => setFormAvaliacao({...formAvaliacao, hdaInicio: 'Gradual'})} class="w-4 h-4 text-emerald-600 border-slate-300 focus:ring-emerald-500 mr-2" />
                                                                Gradual
                                                            </label>
                                                        </div>
                                                    </div>
                                                    <div>
                                                        <label class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-2">Tempo de Evolução</label>
                                                        <input type="text" placeholder="Ex: 3 semanas, 2 meses" value={formAvaliacao.hdaTempo} onChange={(e) => setFormAvaliacao({...formAvaliacao, hdaTempo: e.target.value})} class="w-full border border-slate-200 rounded-xl px-4 py-2 focus:ring-2 focus:ring-emerald-500 focus:outline-none text-sm font-medium" />
                                                    </div>
                                                    <div class="md:col-span-2">
                                                        <label class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-2">Mecanismo de Lesão (Se houver)</label>
                                                        <textarea rows="2" placeholder="Iniciou ao carregar um engradado pesado de água..." value={formAvaliacao.hdaMecanismo} onChange={(e) => setFormAvaliacao({...formAvaliacao, hdaMecanismo: e.target.value})} class="w-full border border-slate-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-emerald-500 focus:outline-none text-sm font-medium"></textarea>
                                                    </div>
                                                    <div>
                                                        <label class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-2">Fatores de Melhora</label>
                                                        <input type="text" placeholder="Ex: Compressas frias, repouso" value={formAvaliacao.hdaFatoresMelhora} onChange={(e) => setFormAvaliacao({...formAvaliacao, hdaFatoresMelhora: e.target.value})} class="w-full border border-slate-200 rounded-xl px-4 py-2 focus:ring-2 focus:ring-emerald-500 focus:outline-none text-sm font-medium" />
                                                    </div>
                                                    <div>
                                                        <label class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-2">Fatores de Piora</label>
                                                        <input type="text" placeholder="Ex: Deambular rápido, subir degraus" value={formAvaliacao.hdaFatoresPiora} onChange={(e) => setFormAvaliacao({...formAvaliacao, hdaFatoresPiora: e.target.value})} class="w-full border border-slate-200 rounded-xl px-4 py-2 focus:ring-2 focus:ring-emerald-500 focus:outline-none text-sm font-medium" />
                                                    </div>
                                                    <div>
                                                        <label class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-2">Evolução Geral do Quadro</label>
                                                        <select value={formAvaliacao.hdaEvolucao} onChange={(e) => setFormAvaliacao({...formAvaliacao, hdaEvolucao: e.target.value})} class="w-full border border-slate-200 rounded-xl px-4 py-2 bg-white focus:ring-2 focus:ring-emerald-500 focus:outline-none text-sm font-medium">
                                                            <option value="Melhora gradativa">Melhora gradativa</option>
                                                            <option value="Estacionário">Estacionário</option>
                                                            <option value="Piora progressiva">Piora progressiva</option>
                                                        </select>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    {/* PASSO 3: ANTECEDENTES CLINICOS E HÁBITOS DE VIDA */}
                                    {step === 3 && (
                                        <div class="space-y-6">
                                            <div class="border-b border-slate-100 pb-4 mb-4">
                                                <h3 class="text-lg font-bold text-slate-900">3. Antecedentes Clínicos e Hábitos (HPP)</h3>
                                                <p class="text-sm text-slate-500">Mapeamento de comorbidades sistêmicas e rotinas sociais.</p>
                                            </div>

                                            <div class="space-y-6">
                                                <div>
                                                    <label class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-3">Comorbidades (Selecione todas que se aplicam)</label>
                                                    <div class="grid grid-cols-2 sm:grid-cols-3 gap-3">
                                                        {[
                                                            { key: "comorbidadesHas", label: "Hipertensão (HAS)" },
                                                            { key: "comorbidadesDm", label: "Diabetes (DM)" },
                                                            { key: "comorbidadesCardio", label: "Cardiopatia/Arritmia" },
                                                            { key: "comorbidadesRespiratorios", label: "Distúrbio Respiratório" },
                                                            { key: "comorbidadesRenais", label: "Alteração Renal/Hepática" },
                                                            { key: "comorbidadesCirculatorios", label: "Problemas Circulatórios/TVP" },
                                                            { key: "comorbidadesReumaticas", label: "Doença Reumática" },
                                                            { key: "comorbidadesNeoplasias", label: "Neoplasia/Câncer" },
                                                            { key: "comorbidadesNeurologicos", label: "Problema Neurológico" }
                                                        ].map(item => (
                                                            <label key={item.key} class={`flex items-center px-4 py-3 rounded-xl border text-sm font-semibold cursor-pointer transition select-none ${formAvaliacao[item.key] ? 'bg-emerald-50 border-emerald-500 text-emerald-800' : 'bg-white border-slate-200 hover:bg-slate-50'}`}>
                                                                <input type="checkbox" checked={formAvaliacao[item.key]} onChange={(e) => setFormAvaliacao({...formAvaliacao, [item.key]: e.target.checked})} class="hidden" />
                                                                {formAvaliacao[item.key] && <span class="w-2 h-2 rounded-full bg-emerald-600 mr-2"></span>}
                                                                {item.label}
                                                            </label>
                                                        ))}
                                                    </div>
                                                </div>

                                                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                    <div>
                                                        <label class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-1">Alergias conhecidas</label>
                                                        <input type="text" placeholder="Ex: Dipirona, iodo..." value={formAvaliacao.comorbidadesAlergias} onChange={(e) => setFormAvaliacao({...formAvaliacao, comorbidadesAlergias: e.target.value})} class="w-full border border-slate-200 rounded-xl px-4 py-2 focus:ring-2 focus:ring-emerald-500 focus:outline-none text-sm font-medium" />
                                                    </div>
                                                    <div>
                                                        <label class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-1">Cirurgias Anteriores</label>
                                                        <input type="text" placeholder="Procedimento e Ano..." value={formAvaliacao.comorbidadesCirurgias} onChange={(e) => setFormAvaliacao({...formAvaliacao, comorbidadesCirurgias: e.target.value})} class="w-full border border-slate-200 rounded-xl px-4 py-2 focus:ring-2 focus:ring-emerald-500 focus:outline-none text-sm font-medium" />
                                                    </div>
                                                    <div>
                                                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Implantes Metálicos/Prótese/Marcapasso</label>
                                                        <input type="text" placeholder="Importante para correntes elétricas..." value={formAvaliacao.comorbidadesImplantes} onChange={(e) => setFormAvaliacao({...formAvaliacao, comorbidadesImplantes: e.target.value})} class="w-full border border-slate-200 rounded-xl px-4 py-2 focus:ring-2 focus:ring-emerald-500 focus:outline-none text-sm font-medium" />
                                                    </div>
                                                    <div>
                                                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Fármacos em Uso Contínuo</label>
                                                        <input type="text" placeholder="Anti-hipertensivos, corticoides, analgesicos..." value={formAvaliacao.comorbidadesMedicamentos} onChange={(e) => setFormAvaliacao({...formAvaliacao, comorbidadesMedicamentos: e.target.value})} class="w-full border border-slate-200 rounded-xl px-4 py-2 focus:ring-2 focus:ring-emerald-500 focus:outline-none text-sm font-medium" />
                                                    </div>
                                                </div>

                                                <div class="border-t border-slate-100 pt-4 grid grid-cols-1 md:grid-cols-3 gap-4">
                                                    <div>
                                                        <label class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-1">Atividade Física</label>
                                                        <select value={formAvaliacao.habitosAtividade} onChange={(e) => setFormAvaliacao({...formAvaliacao, habitosAtividade: e.target.value})} class="w-full border border-slate-200 rounded-xl px-4 py-2 bg-white text-sm font-medium">
                                                            <option value="Sedentário">Sedentário</option>
                                                            <option value="Ativo">Ativo</option>
                                                        </select>
                                                        {formAvaliacao.habitosAtividade === 'Ativo' && (
                                                            <input type="text" placeholder="Frequência / Tipo" value={formAvaliacao.habitosAtividadeDetalhes} onChange={(e) => setFormAvaliacao({...formAvaliacao, habitosAtividadeDetalhes: e.target.value})} class="mt-2 w-full border border-slate-200 rounded-xl px-3 py-1 text-xs" />
                                                        )}
                                                    </div>
                                                    <div>
                                                        <label class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-1">Tabagismo</label>
                                                        <select value={formAvaliacao.habitosTabagismo} onChange={(e) => setFormAvaliacao({...formAvaliacao, habitosTabagismo: e.target.value})} class="w-full border border-slate-200 rounded-xl px-4 py-2 bg-white text-sm font-medium">
                                                            <option value="Não">Não</option>
                                                            <option value="Sim">Sim</option>
                                                            <option value="Ex-fumante">Ex-fumante</option>
                                                        </select>
                                                    </div>
                                                    <div>
                                                        <label class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-1">Etilismo</label>
                                                        <select value={formAvaliacao.habitosEtilismo} onChange={(e) => setFormAvaliacao({...formAvaliacao, habitosEtilismo: e.target.value})} class="w-full border border-slate-200 rounded-xl px-4 py-2 bg-white text-sm font-medium">
                                                            <option value="Não">Não</option>
                                                            <option value="Sim">Sim</option>
                                                            <option value="Socialmente">Socialmente</option>
                                                        </select>
                                                    </div>
                                                    <div>
                                                        <label class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-1">Qualidade do Sono</label>
                                                        <select value={formAvaliacao.habitosSono} onChange={(e) => setFormAvaliacao({...formAvaliacao, habitosSono: e.target.value})} class="w-full border border-slate-200 rounded-xl px-4 py-2 bg-white text-sm font-medium">
                                                            <option value="Excelente">Excelente</option>
                                                            <option value="Boa">Boa</option>
                                                            <option value="Regular">Regular</option>
                                                            <option value="Ruim">Ruim (Dificulta o repouso)</option>
                                                        </select>
                                                    </div>
                                                    <div>
                                                        <label class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-1">Ingestão Diária de Água</label>

                                        </div>

                                    {/* PASSO 5: EXAME FÍSICO GERAL E SINAIS VITAIS */}

                                                            <option value="Hiporreflexia">Hiporreflexia</option>
                                                            <option value="Hiperreflexia">Hiperreflexia</option>
                                                        </select>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    {/* PASSO 6: TESTES ESPECIAIS, ADM E FORÇA (DINÂMICOS) */}

                                                </div>

                                                        </select>

                                        >
                                            Seguinte <Icon name="chevron-right" className="w-4 h-4" />
                                        </button>
                                    ) : (
                                        <button 
                                            onClick={handleSaveAvaliacao}
                                            class="px-5 py-2.5 bg-emerald-600 hover:bg-emerald-700 text-white rounded-xl text-sm font-semibold shadow-md transition"
                                        >
                                            Salvar Avaliação Inicial
                                        </button>
                                    )}
                                </div>
                            </div>
                        )}

                        {/* 3. CLÍNICAS PARCEIRAS (DIRETÓRIO DA REDE) */}
                        {activeTab === "clinicas" && (
                            <div class="space-y-6">
                                <div>
                                    <h2 class="text-2xl font-bold text-slate-900">FisioHub Rede Nacional</h2>
                                    <p class="text-sm text-slate-500">Compartilhe prontuários e faça encaminhamentos seguros para clínicas homologadas no ecossistema.</p>
                                </div>

                                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                                    {CLINICAS_REDE.map((c) => (
                                        <div key={c.id} class="bg-white border border-slate-200 rounded-2xl p-6 shadow-sm flex flex-col justify-between hover:border-emerald-200 transition">
                                            <div>
                                                <div class="w-12 h-12 bg-emerald-50 text-emerald-600 rounded-xl flex items-center justify-center mb-4">
                                                    <Icon name="building" className="w-6 h-6" />
                                                </div>
                                                <h3 class="font-bold text-lg text-slate-900">{c.nome}</h3>
                                                <p class="text-sm text-slate-500 mt-1"><strong class="text-slate-700">Responsável:</strong> {c.responsavel}</p>
                                                <p class="text-xs text-slate-400 mt-1 flex items-center gap-1"><Icon name="map-pin" className="w-3.5 h-3.5" /> {c.cidade}</p>
                                            </div>
                                            <div class="mt-6 pt-4 border-t border-slate-100 flex items-center gap-2">
                                                <span class="inline-block w-2.5 h-2.5 bg-emerald-500 rounded-full animate-pulse"></span>
                                                <span class="text-xs text-slate-500 font-bold">Ligada à Rede</span>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                    </main>

                    {/* MODAL: ALTERAR PERFIL / CONFIGURAÇÕES */}
                    {showPerfilModal && (
                        <div class="fixed inset-0 z-50 overflow-y-auto bg-slate-900/60 flex items-center justify-center p-4">
                            <div class="bg-white rounded-3xl max-w-md w-full p-6 shadow-xl border border-slate-200 animate-scale-up">
                                <div class="flex justify-between items-center border-b pb-4 mb-4">
                                    <h3 class="text-lg font-bold text-slate-900 flex items-center gap-2">
                                        <Icon name="settings" className="w-5 h-5 text-emerald-600" /> Configurar Perfil
                                    </h3>
                                    <button onClick={() => setShowPerfilModal(false)} class="p-1 hover:bg-slate-100 rounded-full transition">
                                        <Icon name="x" className="w-5 h-5 text-slate-400" />
                                    </button>
                                </div>

                                <form onSubmit={handleSavePerfil} class="space-y-4">
                                    <div>
                                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Nome do Profissional</label>
                                        <input 
                                            type="text" 
                                            name="nome" 
                                            defaultValue={perfil.nome} 
                                            required
                                            class="w-full border border-slate-200 rounded-xl px-4 py-2.5 focus:ring-2 focus:ring-emerald-500 focus:outline-none"
                                        />
                                    </div>
                                    <div>
                                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Inscrição CREFITO</label>
                                        <input 
                                            type="text" 
                                            name="crefito" 
                                            defaultValue={perfil.crefito} 
                                            required
                                            class="w-full border border-slate-200 rounded-xl px-4 py-2.5 focus:ring-2 focus:ring-emerald-500 focus:outline-none"
                                        />
                                    </div>
                                    <div>
                                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Nome do Consultório / Clínica</label>
                                        <input 
                                            type="text" 
                                            name="clinica" 
                                            defaultValue={perfil.clinica} 
                                            class="w-full border border-slate-200 rounded-xl px-4 py-2.5 focus:ring-2 focus:ring-emerald-500 focus:outline-none"
                                        />
                                    </div>
                                    <div>
                                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Telefone Comercial</label>
                                        <input 
                                            type="text" 
                                            name="telefone" 
                                            defaultValue={perfil.telefone} 
                                            class="w-full border border-slate-200 rounded-xl px-4 py-2.5 focus:ring-2 focus:ring-emerald-500 focus:outline-none"
                                        />
                                    </div>

                                    <div class="flex gap-2 justify-end pt-4 border-t border-slate-100">
                                        <button type="button" onClick={() => setShowPerfilModal(false)} class="px-4 py-2 text-slate-500 hover:text-slate-700 font-semibold text-sm transition">Cancelar</button>
                                        <button type="submit" class="px-4 py-2 bg-emerald-600 hover:bg-emerald-700 text-white rounded-xl text-sm font-semibold shadow-sm transition">Salvar Alterações</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* MODAL: COMPARTILHAR PRONTUÁRIO */}
                    {showShareModal && (
                        <div class="fixed inset-0 z-50 overflow-y-auto bg-slate-900/60 flex items-center justify-center p-4">
                            <div class="bg-white rounded-3xl max-w-md w-full p-6 shadow-xl border border-slate-200 animate-scale-up">
                                <div class="flex justify-between items-center border-b pb-4 mb-4">
                                    <h3 class="text-lg font-bold text-slate-900 flex items-center gap-2">
                                        <Icon name="share-2" className="w-5 h-5 text-emerald-600" /> Encaminhar Prontuário
                                    </h3>
                                    <button onClick={() => setShowShareModal(false)} class="p-1 hover:bg-slate-100 rounded-full transition">
                                        <Icon name="x" className="w-5 h-5 text-slate-400" />
                                    </button>
                                </div>

                                <div class="space-y-4">
                                    <p class="text-sm text-slate-500">Selecione uma das clínicas homologadas abaixo para enviar a cópia encriptada do prontuário com segurança legal:</p>
                                    
                                    <div class="space-y-2 max-h-60 overflow-y-auto no-scrollbar">
                                        {CLINICAS_REDE.map((c) => (
                                            <button 
                                                key={c.id}
                                                onClick={() => handleSimulateShare(c.nome)}
                                                class="w-full p-3 border border-slate-200 hover:border-emerald-500 hover:bg-emerald-50/50 rounded-xl text-left transition flex justify-between items-center"
                                            >
                                                <div>
                                                    <h4 class="font-bold text-sm text-slate-900">{c.nome}</h4>
                                                    <p class="text-xs text-slate-500">{c.responsavel} • {c.cidade}</p>
                                                </div>
                                                <Icon name="chevron-right" className="w-4 h-4 text-emerald-600" />
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL: REGISTRAR NOVA EVOLUÇÃO (SESSÃO) */}
                    {showEvolucaoModal && (
                        <div class="fixed inset-0 z-50 overflow-y-auto bg-slate-900/60 flex items-center justify-center p-4">
                            <div class="bg-white rounded-3xl max-w-lg w-full p-6 shadow-xl border border-slate-200 animate-scale-up">
                                <div class="flex justify-between items-center border-b pb-4 mb-4">
                                    <h3 class="text-lg font-bold text-slate-900 flex items-center gap-2">
                                        <Icon name="plus-circle" className="w-5 h-5 text-emerald-600" /> Evolução da Sessão Diária
                                    </h3>
                                    <button onClick={() => setShowEvolucaoModal(false)} class="p-1 hover:bg-slate-100 rounded-full transition">
                                        <Icon name="x" className="w-5 h-5 text-slate-400" />
                                    </button>
                                </div>

                                <form onSubmit={handleAddEvolucao} class="space-y-4">
                                    <div class="grid grid-cols-2 gap-4">
                                        <div>
                                            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Data da Sessão</label>
                                            <input 
                                                type="date" 
                                                value={formEvolucao.data} 
                                                onChange={(e) => setFormEvolucao({...formEvolucao, data: e.target.value})}
                                                required
                                                class="w-full border border-slate-200 rounded-xl px-4 py-2 focus:ring-2 focus:ring-emerald-500 focus:outline-none text-sm"
                                            />
                                        </div>
                                        <div>
                                            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Escala de Dor (EVA)</label>
                                            <select 
                                                value={formEvolucao.dorAtual}
                                                onChange={(e) => setFormEvolucao({...formEvolucao, dorAtual: e.target.value})}
                                                class="w-full border border-slate-200 rounded-xl px-4 py-2 bg-white focus:ring-2 focus:ring-emerald-500 focus:outline-none text-sm"
                                            >
                                                {[...Array(11).keys()].map(i => (
                                                    <option key={i} value={i}>Dor Nível {i}</option>
                                                ))}
                                            </select>
                                        </div>
                                    </div>

                                    <div>
                                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Relato Subjetivo do Paciente</label>
                                        <textarea 
                                            rows="2" 
                                            placeholder="Ex: Refere melhoria considerável de dores lombares de manhã..."
                                            value={formEvolucao.subjetivo}
                                            onChange={(e) => setFormEvolucao({...formEvolucao, ...formEvolucao, subjetivo: e.target.value})}
                                            required
                                            class="w-full border border-slate-200 rounded-xl px-4 py-2 focus:ring-2 focus:ring-emerald-500 focus:outline-none text-sm"
                                        ></textarea>
                                    </div>

                                    <div>
                                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Conduta Realizada & Resultados Clínicos</label>
                                        <textarea 
                                            rows="3" 
                                            placeholder="Ex: Cinesioterapia com prancha isométrica, controlo motor escapular..."
                                            value={formEvolucao.conduta}
                                            onChange={(e) => setFormEvolucao({...formEvolucao, conduta: e.target.value})}
                                            required
                                            class="w-full border border-slate-200 rounded-xl px-4 py-2 focus:ring-2 focus:ring-emerald-500 focus:outline-none text-sm"
                                        ></textarea>
                                    </div>

                                    <div class="flex gap-2 justify-end pt-4 border-t border-slate-100">
                                        <button type="button" onClick={() => setShowEvolucaoModal(false)} class="px-4 py-2 text-slate-500 hover:text-slate-700 font-semibold text-sm transition">Cancelar</button>
                                        <button type="submit" class="px-4 py-2 bg-emerald-600 hover:bg-emerald-700 text-white rounded-xl text-sm font-semibold shadow-sm transition">Registar Sessão</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* ASSINATURA DE DESENVOLVEDOR NO RODAPÉ */}
                    <footer class="bg-slate-900 text-slate-400 py-6 border-t border-slate-800 no-print">
                        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col md:flex-row justify-between items-center gap-4 text-xs font-medium">
                            <div class="flex items-center gap-2">
                                <span class="bg-emerald-950 text-emerald-400 px-2.5 py-1 rounded-md font-bold">FisioHub v2.0</span>
                                <span>© 2026 FisioHub System. Todos os direitos reservados.</span>
                            </div>
                            <div class="text-slate-300">
                                Desenvolvido por <span class="font-extrabold text-emerald-400">Vinicius Barros do Anjos</span>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        }

        // Renderização da App na Div root
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
